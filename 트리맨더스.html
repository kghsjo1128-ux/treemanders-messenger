                {holidaySubTab === "fixed" && <AdminEmployeeFixedOffEditor fixedOffByEmail={fixedOffByEmail} />}
                {holidaySubTab === "list" && (
                  <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 12 }}>신청 건별 승인·반려</div>
                )}
                {holidaySubTab === "list" && leaveRequests.map((h) => {
                  const st = { pending: { label: "대기중", color: COLORS.warning }, approved: { label: "승인됨", color: COLORS.success }, rejected: { label: "반려", color: COLORS.danger } }[h.status];
                  return (
                    <div key={h.id} style={styles.card}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                        <span style={{ fontWeight: 600 }}>{h.user}</span>
                        <span style={styles.badge(st.color)}>{st.label}</span>
                      </div>
                      <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 4 }}>📅 {leaveDisplayRange(h)}</div>
                      <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 12 }}>사유: {h.reason}</div>
                      {h.status === "pending" && (
                        <div style={{ display: "flex", gap: 8 }}>
                          <button onClick={() => handleApprove(h.id)} style={{ flex: 1, padding: 10, background: COLORS.success, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>승인</button>
                          <button onClick={() => handleReject(h.id)} style={{ flex: 1, padding: 10, background: COLORS.danger, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>반려</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* Jobs */}
            {activeMenu === "jobs" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <div style={{ fontSize: 12, color: COLORS.textMuted }}>구인 공고 {jobs.length}건</div>
                  <button onClick={() => setShowJobForm(true)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 14px", background: COLORS.primary, color: COLORS.dark, border: "none", borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>
                    <Icons.Plus /> 새 공고
                  </button>
                </div>

                {showJobForm && (
                  <div style={{ ...styles.card, borderColor: COLORS.primary + "44" }}>
                    <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>구인 공고 작성</div>
                    <JobPostFormFields form={jobForm} setForm={setJobForm} />
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={() => setShowJobForm(false)} style={{ flex: 1, padding: 12, background: COLORS.border, color: COLORS.text, border: "none", borderRadius: 10, cursor: "pointer", fontFamily: FONT }}>취소</button>
                      <button onClick={handleCreateJob} style={{ flex: 1, padding: 12, background: COLORS.primary, color: COLORS.dark, border: "none", borderRadius: 10, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>저장</button>
                    </div>
                  </div>
                )}

                {jobs.map((j) => (
                  <div key={j.id} style={styles.card}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>{jobListSummaryTitle(j)}</div>
                        <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.4 }}>
                          {[j.workType && `근무형태: ${j.workType}`, j.monthlyVolume && `물량: ${j.monthlyVolume}`].filter(Boolean).join(" · ") || "저장됨 · 상세보기로 확인"}
                        </div>
                      </div>
                      <span style={styles.badge(COLORS.success)}>등록</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "flex-end" }}>
                      <button
                        type="button"
                        onClick={() => {
                          setJobDetail(j);
                          setJobDetailEditMode(false);
                        }}
                        style={{
                          padding: "8px 14px",
                          background: `${COLORS.accent}22`,
                          color: COLORS.accentLight,
                          border: "none",
                          borderRadius: 8,
                          fontSize: 12,
                          fontWeight: 600,
                          cursor: "pointer",
                          fontFamily: FONT,
                          display: "flex",
                          alignItems: "center",
                          gap: 6,
                        }}
                      >
                        <Icons.Eye /> 상세보기
                      </button>
                    </div>
                  </div>
                ))}

                {jobDetail && (
                  <div
                    style={styles.modal}
                    onClick={() => {
                      setJobDetail(null);
                      setJobDetailEditMode(false);
                    }}
                  >
                    <div
                      onClick={(e) => e.stopPropagation()}
                      style={{
                        width: "100%",
                        maxWidth: 480,
                        maxHeight: "88vh",
                        overflowY: "auto",
                        background: COLORS.cardBg,
                        borderRadius: 16,
                        padding: "clamp(16px, 4vw, 22px)",
                        border: `1px solid ${COLORS.border}`,
                      }}
                    >
                      <div style={{ fontWeight: 800, fontSize: 17, marginBottom: 12 }}>{jobDetailEditMode ? "공고 수정" : "공고 상세"}</div>
                      {jobDetailEditMode ? (
                        <>
                          <JobPostFormFields form={detailEditForm} setForm={setDetailEditForm} />
                          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                            <button
                              type="button"
                              onClick={() => setJobDetailEditMode(false)}
                              style={{ flex: 1, padding: 12, background: COLORS.border, color: COLORS.text, border: "none", borderRadius: 10, cursor: "pointer", fontFamily: FONT }}
                            >
                              취소
                            </button>
                            <button
                              type="button"
                              onClick={handleUpdateJobFromDetail}
                              style={{ flex: 1, padding: 12, background: COLORS.primary, color: COLORS.dark, border: "none", borderRadius: 10, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}
                            >
                              저장
                            </button>
                          </div>
                        </>
                      ) : (
                        <>
                          <JobPostDetailBody job={jobDetail} />
                          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 16 }}>
                            <div style={{ display: "flex", gap: 8 }}>
                              <button
                                type="button"
                                onClick={() => {
                                  setDetailEditForm(jobToForm(jobDetail));
                                  setJobDetailEditMode(true);
                                }}
                                style={{
                                  flex: 1,
                                  padding: 12,
                                  background: `${COLORS.accent}28`,
                                  color: COLORS.accentLight,
                                  border: `1px solid ${COLORS.accent}55`,
                                  borderRadius: 10,
                                  fontWeight: 600,
                                  cursor: "pointer",
                                  fontFamily: FONT,
                                }}
                              >
                                수정
                              </button>
                              <button
                                type="button"
                                onClick={handleDeleteJobFromDetail}
                                style={{
                                  flex: 1,
                                  padding: 12,
                                  background: `${COLORS.danger}22`,
                                  color: COLORS.danger,
                                  border: `1px solid ${COLORS.danger}66`,
                                  borderRadius: 10,
                                  fontWeight: 600,
                                  cursor: "pointer",
                                  fontFamily: FONT,
                                }}
                              >
                                삭제
                              </button>
                            </div>
                            <button
                              type="button"
                              onClick={() => {
                                setJobDetail(null);
                                setJobDetailEditMode(false);
                              }}
                              style={{
                                width: "100%",
                                padding: 14,
                                background: COLORS.primary,
                                color: COLORS.dark,
                                border: "none",
                                borderRadius: 12,
                                fontWeight: 700,
                                cursor: "pointer",
                                fontFamily: FONT,
                              }}
                            >
                              닫기
                            </button>
                          </div>
                        </>
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// Main App
// ============================================================
function TreeMandersApp() {
  const [screen, setScreen] = useState("login");
  const [currentUser, setCurrentUser] = useState(null);
  const [activeTab, setActiveTab] = useState("chat");
  const [activeChatRoom, setActiveChatRoom] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [loginGateMessage, setLoginGateMessage] = useState("");
  const [withdrawOpen, setWithdrawOpen] = useState(false);
  const [passwordChangeMode, setPasswordChangeMode] = useState("forced");
  const [leaveRequests, setLeaveRequests] = useState([]);
  const [fixedOffByEmail, setFixedOffByEmail] = useState({});
  const [dmRooms, setDmRooms] = useState([]);
  const [, setChatReadBump] = useState(0);
  const [chatListSelectMode, setChatListSelectMode] = useState(false);
  const [selectedChatRoomIds, setSelectedChatRoomIds] = useState([]);
  const [hiddenChatListTick, setHiddenChatListTick] = useState(0);
  const [employeeApprovalsList, setEmployeeApprovalsList] = useState([]);

  useEffect(() => {
    try {
      const u = new URL(window.location.href);
      if (u.searchParams.get("tm_login") === "1") {
        setScreen("login");
        u.searchParams.delete("tm_login");
        const rest = u.searchParams.toString();
        window.history.replaceState({}, "", u.pathname + (rest ? "?" + rest : "") + u.hash);
      }
    } catch (_) {}
  }, []);

  useEffect(() => {
    return firebase.auth().onAuthStateChanged(async (user) => {
      if (user) {
        try {
          if (!isSuperAdminEmail(user.email) && !isAdminEmail(user.email)) {
            const chk = await checkSignupApproved(user.uid, user.email);
            if (!chk.approved) {
              await firebase.auth().signOut();
              setLoginGateMessage(chk.message || "로그인할 수 없습니다.");
              setCurrentUser(null);
              setScreen("login");
              setAuthReady(true);
              return;
            }
          }
        } catch (e) {
          console.error(e);
          try {
            await firebase.auth().signOut();
          } catch (_) {}
          setLoginGateMessage("가입 상태를 확인하지 못했습니다.");
          setCurrentUser(null);
          setScreen("login");
          setAuthReady(true);
          return;
        }

        setLoginGateMessage("");
        mergeEmployeeRoster({
          uid: user.uid,
          name: user.displayName || (user.email && user.email.split("@")[0]) || "사용자",
          email: user.email || "",
        });
        setCurrentUser(firebaseUserToProfile(user));
        const superAdmin = isSuperAdminEmail(user.email);
        const mustVerify = !user.emailVerified && !superAdmin;
        if (mustVerify) {
          setScreen((s) => (s === "register" ? s : "verifyEmail"));
        } else {
          let needPwChange = false;
          if (!superAdmin) {
            try {
              const pe = await ensurePasswordMetaAndCheckExpired(user.uid, user.email);
              if (pe.expired) needPwChange = true;
            } catch (err) {
              console.error("[passwordMeta]", err);
            }
          }
          if (needPwChange) {
            setPasswordChangeMode("forced");
            setScreen("passwordChange");
          } else {
            setScreen((s) => {
              if (s === "verifyEmail" || ["login", "register", "findAccount"].includes(s)) return "main";
              return s;
            });
          }
        }
      } else {
        setCurrentUser(null);
        setScreen((s) => (["main", "admin", "verifyEmail", "passwordChange"].includes(s) ? "login" : s));
      }
      setAuthReady(true);
    });
  }, []);

  useEffect(() => {
    if (screen === "admin" && currentUser && currentUser.role !== "admin") setScreen("main");
  }, [screen, currentUser]);

  useEffect(() => {
    if (!currentUser || !firebase.auth().currentUser) {
      setLeaveRequests([]);
      setFixedOffByEmail({});
      return undefined;
    }
    const db = firebase.firestore();
    const unLeave = db.collection("leaveRequests").onSnapshot(
      (snap) => {
        const rows = [];
        snap.forEach((d) => rows.push(leaveRequestFromDoc(d)));
        rows.sort((a, b) => {
          const ta = a.createdAt && typeof a.createdAt.seconds === "number" ? a.createdAt.seconds : 0;
          const tb = b.createdAt && typeof b.createdAt.seconds === "number" ? b.createdAt.seconds : 0;
          return tb - ta;
        });
        setLeaveRequests(rows);
      },
      (e) => console.error("[leaveRequests]", e)
    );
    const unFixed = db.collection("employeeFixedOff").onSnapshot(
      (snap) => {
        const m = {};
        snap.forEach((doc) => {
          const x = doc.data() || {};
          const em = String(x.email || "").toLowerCase().trim();
          if (!em) return;
          m[em] = {
            fixedWeeklyOff: Array.isArray(x.fixedWeeklyOff) ? x.fixedWeeklyOff.map(Number).filter((n) => n >= 0 && n <= 6) : [],
            userName: String(x.userName || ""),
          };
        });
        setFixedOffByEmail(m);
      },
      (e) => console.error("[employeeFixedOff]", e)
    );
    return () => {
      unLeave();
      unFixed();
    };
  }, [currentUser?.email]);

  useEffect(() => {
    if (!currentUser?.email || !firebase.auth().currentUser) {
      setEmployeeApprovalsList([]);
      return undefined;
    }
    const un = firebase.firestore().collection("employeeApprovals").onSnapshot(
      (snap) => {
        const rows = [];
        snap.forEach((d) => rows.push({ id: d.id, ...(d.data() || {}) }));
        setEmployeeApprovalsList(rows);
      },
      (e) => console.error("[employeeApprovals 동료목록]", e)
    );
    return () => un();
  }, [currentUser?.email]);

  useEffect(() => {
    if (currentUser?.role === "admin" && activeTab === "leave") setActiveTab("chat");
  }, [currentUser, activeTab]);

  useEffect(() => {
    if (activeTab !== "chat") {
      setChatListSelectMode(false);
      setSelectedChatRoomIds([]);
    }
  }, [activeTab]);

  useEffect(() => {
    if (!currentUser?.email) {
      setDmRooms([]);
      return undefined;
    }
    setDmRooms(loadDmRooms(currentUser.email));
    const sync = () => {
      if (currentUser?.email) setDmRooms(loadDmRooms(currentUser.email));
    };
    window.addEventListener("treemanders-dm-rooms-updated", sync);
    return () => window.removeEventListener("treemanders-dm-rooms-updated", sync);
  }, [currentUser?.email]);

  useEffect(() => {
    if (!currentUser?.email) return undefined;
    const bump = () => setHiddenChatListTick((t) => t + 1);
    window.addEventListener("treemanders-chat-hidden-updated", bump);
    return () => window.removeEventListener("treemanders-chat-hidden-updated", bump);
  }, [currentUser?.email]);

  const isAdmin = currentUser?.role === "admin";
  const canSeeJobsInChat = isSuperAdminEmail(currentUser?.email) || adminHasPerm(currentUser?.email, "jobs");

  const baseChatRooms = useMemo(() => {
    const holidayRow = buildHolidayChatListRow(leaveRequests, currentUser?.email, isAdmin);
    const rooms = [
      { id: "notice", name: "📢 공지사항", lastMsg: "공지사항을 확인하세요", time: "", unread: 0, type: "notice" },
      { id: "schedule", name: "📅 스케줄표", lastMsg: "구역 배정·스케줄", time: "", unread: 0, type: "schedule" },
      holidayRow,
    ];
    if (canSeeJobsInChat) {
      rooms.push({ id: "jobs", name: "📋 구인 공고", lastMsg: "채용 안내", time: "", unread: 0, type: "jobs" });
    }
    return rooms;
  }, [leaveRequests, currentUser?.email, isAdmin, canSeeJobsInChat]);

  const chatRooms = useMemo(() => [...dmRooms, ...baseChatRooms], [dmRooms, baseChatRooms]);

  const hiddenChatIdSet = useMemo(
    () => new Set(getHiddenChatRoomIds(currentUser?.email)),
    [currentUser?.email, hiddenChatListTick]
  );

  const chatRoomsVisible = useMemo(
    () => chatRooms.filter((r) => !hiddenChatIdSet.has(String(r.id))),
    [chatRooms, hiddenChatIdSet]
  );

  const handleDmSent = useCallback(
    (room, text) => {
      if (!currentUser?.email) return;
      const preview = text.length > 60 ? text.slice(0, 60) + "…" : text;
      const time = new Date().toLocaleTimeString("ko", { hour: "2-digit", minute: "2-digit" });
      setDmRooms((prev) => {
        const next = prev.map((r) => (r.id === room.id ? { ...r, lastMsg: preview, time } : r));
        saveDmRooms(currentUser.email, next);
        return next;
      });
    },
    [currentUser?.email]
  );

  const openDirectChat = useCallback(
    (peer) => {
      const email = String(peer?.email || "").trim();
      if (!email || !currentUser?.email) return;
      if (email.toLowerCase() === currentUser.email.toLowerCase()) return;
      const id = dmRoomId(email);
      const name = String(peer.name || "").trim() || email.split("@")[0];
      const owner = currentUser.email;
      setDmRooms((prev) => {
        if (prev.some((r) => r.id === id)) return prev;
        const newRoom = {
          id,
          type: "dm",
          name: `💬 ${name}`,
          peerEmail: email,
          peerName: name,
          lastMsg: "대화를 시작해보세요",
          time: "방금",
          unread: 0,
        };
        const next = [newRoom, ...prev];
        saveDmRooms(owner, next);
        return next;
      });
      setActiveTab("chat");
      setActiveChatRoom(id);
    },
    [currentUser?.email]
  );

  useEffect(() => {
    if (!activeChatRoom) return;
    const exists = chatRoomsVisible.some((r) => r.id === activeChatRoom);
    if (!exists) setActiveChatRoom(null);
  }, [activeChatRoom, chatRoomsVisible]);

  useEffect(() => {
    if (activeChatRoom !== "jobs") return;
    if (!canSeeJobsInChat) setActiveChatRoom(null);
  }, [activeChatRoom, canSeeJobsInChat]);

  useEffect(() => {
    if (!activeChatRoom || !currentUser?.email) return;
    markChatRoomRead(currentUser.email, activeChatRoom);
    setChatReadBump((n) => n + 1);
  }, [activeChatRoom, currentUser?.email]);

  const canClearChatHistory = isSuperAdminEmail(currentUser?.email) || adminHasPerm(currentUser?.email, "chatClear");

  const visibleRooms = useMemo(() => {
    const src = chatRoomsVisible;
    return isAdmin
      ? src.filter((r) => r.type !== "jobs" || canSeeJobsInChat)
      : src.filter((r) => r.type === "chat" || r.type === "schedule" || r.type === "notice" || r.type === "holiday" || r.type === "dm");
  }, [isAdmin, chatRoomsVisible, canSeeJobsInChat]);

  const toggleSelectChatRoom = useCallback((roomId) => {
    const id = String(roomId);
    setSelectedChatRoomIds((prev) => (prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]));
  }, []);

  const deleteSelectedChatRoomsFromList = useCallback(() => {
    if (!isAdmin || !currentUser?.email) return;
    const owner = currentUser.email;
    const ids = selectedChatRoomIds.filter(Boolean);
    if (!ids.length) return;
    if (!window.confirm(`선택한 ${ids.length}개 채팅방을 목록에서 삭제할까요?\n(1:1 방은 대화 목록·기록이 지워지고, 그룹 방은 이 기기 목록에서만 숨깁니다.)`)) return;

    const hiddenAdd = [];
    setDmRooms((prev) => {
      let nextDm = [...prev];
      ids.forEach((id) => {
        const room = chatRooms.find((r) => String(r.id) === String(id));
        if (!room || !isChatRoomDeletableFromList(room)) return;
        if (room.type === "dm") {
          nextDm = nextDm.filter((r) => String(r.id) !== String(id));
          clearDmMessagesForRoom(owner, id);
          removeChatRoomReadEntry(owner, id);
        } else if (room.type === "chat") {
          hiddenAdd.push(String(id));
          clearGroupRoomMessages(owner, id);
          removeChatRoomReadEntry(owner, id);
        }
      });
      saveDmRooms(owner, nextDm);
      return nextDm;
    });

    if (hiddenAdd.length) {
      const merged = [...new Set([...getHiddenChatRoomIds(owner), ...hiddenAdd])];
      saveHiddenChatRoomIds(owner, merged);
    }

    setSelectedChatRoomIds([]);
    setChatListSelectMode(false);
    setChatReadBump((n) => n + 1);
  }, [isAdmin, currentUser?.email, selectedChatRoomIds, chatRooms]);

  if (!authReady) {
    return (
      <div style={{ fontFamily: FONT, width: "100%", flex: 1, minHeight: 0, background: COLORS.darkBg, color: COLORS.textMuted, display: "flex", alignItems: "center", justifyContent: "center" }}>
        불러오는 중…
      </div>
    );
  }

  if (screen === "login") {
    return (
      <LoginScreen
        gateMessage={loginGateMessage}
        onGoRegister={() => {
          setLoginGateMessage("");
          setScreen("register");
        }}
        onGoFindAccount={() => {
          setLoginGateMessage("");
          setScreen("findAccount");
        }}
      />
    );
  }
  if (screen === "register") return <RegisterScreen onBack={() => setScreen("login")} />;
  if (screen === "findAccount") return <FindAccountScreen onBack={() => setScreen("login")} />;
  if (screen === "verifyEmail") return <VerifyEmailScreen />;
  if (screen === "passwordChange") {
    return (
      <PasswordChangeScreen
        forced={passwordChangeMode === "forced"}
        onSuccess={() => {
          setPasswordChangeMode("forced");
          setScreen("main");
        }}
        onCancel={() => {
          if (passwordChangeMode === "optional") setScreen("main");
          else firebase.auth().signOut();
        }}
      />
    );
  }
  if (screen === "admin") return <AdminPanel onBack={() => setScreen("main")} leaveRequests={leaveRequests} actorEmail={currentUser?.email} fixedOffByEmail={fixedOffByEmail} employeeApprovalsList={employeeApprovalsList} />;

  // Chat room views
  if (activeChatRoom) {
    const room = chatRoomsVisible.find((r) => r.id === activeChatRoom);
    if (!room) {
      return (
        <div style={{ fontFamily: FONT, width: "100%", flex: 1, minHeight: 0, background: COLORS.darkBg, color: COLORS.textMuted, display: "flex", alignItems: "center", justifyContent: "center" }}>
          채팅방을 불러오는 중…
        </div>
      );
    }
    if (room.type === "notice") return (
      <div style={{ ...styles.app, flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
        <div style={styles.header}>
          <button onClick={() => setActiveChatRoom(null)} style={{ background: "none", border: "none", color: COLORS.text, cursor: "pointer" }}><Icons.Back /></button>
          <span style={{ fontWeight: 700 }}>{room.name}</span>
          <div style={{ width: 30 }} />
        </div>
        <div style={styles.content}><NoticeBoard adminMode={false} /></div>
      </div>
    );
    if (room.type === "schedule") return (
      <div style={{ ...styles.app, flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
        <div style={styles.header}>
          <button onClick={() => setActiveChatRoom(null)} style={{ background: "none", border: "none", color: COLORS.text, cursor: "pointer" }}><Icons.Back /></button>
          <span style={{ fontWeight: 700 }}>{room.name}</span>
          <div style={{ width: 30 }} />
        </div>
        <div style={styles.content}><ScheduleBoard leaveRequests={leaveRequests} fixedOffByEmail={fixedOffByEmail} allowExcelExport={isAdmin} employeeApprovalsList={employeeApprovalsList} /></div>
      </div>
    );
    if (room.type === "holiday") return (
      <div style={{ ...styles.app, flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
        <div style={styles.header}>
          <button onClick={() => setActiveChatRoom(null)} style={{ background: "none", border: "none", color: COLORS.text, cursor: "pointer" }}><Icons.Back /></button>
          <span style={{ fontWeight: 700 }}>{room.name}</span>
          <div style={{ width: 30 }} />
        </div>
        <div style={styles.content}><HolidayBoard currentUser={currentUser} leaveRequests={leaveRequests} /></div>
      </div>
    );
    if (room.type === "jobs") {
      if (!canSeeJobsInChat) {
        return (
          <div style={{ ...styles.app, flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
            <div style={styles.header}>
              <button onClick={() => setActiveChatRoom(null)} style={{ background: "none", border: "none", color: COLORS.text, cursor: "pointer" }}><Icons.Back /></button>
              <span style={{ fontWeight: 700 }}>구인 공고</span>
              <div style={{ width: 30 }} />
            </div>
            <div style={{ ...styles.content, color: COLORS.textMuted, padding: 24, textAlign: "center" }}>이 메뉴는 관리자(구인 공고 권한)만 볼 수 있습니다.</div>
          </div>
        );
      }
      return (
        <div style={{ ...styles.app, flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
          <div style={styles.header}>
            <button onClick={() => setActiveChatRoom(null)} style={{ background: "none", border: "none", color: COLORS.text, cursor: "pointer" }}><Icons.Back /></button>
            <span style={{ fontWeight: 700 }}>{room.name}</span>
            <div style={{ width: 30 }} />
          </div>
          <div style={{ ...styles.content, overflowY: "auto" }}><PublicJobBoard /></div>
        </div>
      );
    }
    return (
      <div style={{ ...styles.app, flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
        <ChatRoom
          key={room.id}
          room={room}
          onBack={() => setActiveChatRoom(null)}
          currentUser={currentUser}
          dmOwnerEmail={room.type === "dm" ? currentUser?.email : undefined}
          persistOwnerEmail={room.type === "dm" ? undefined : currentUser?.email}
          onDmSent={room.type === "dm" ? handleDmSent : undefined}
          canClearChat={canClearChatHistory && (room.type === "dm" || room.type === "chat")}
        />
      </div>
    );
  }

  // Main App
  return (
    <div style={{ ...styles.app, flex: 1, minHeight: 0 }}>
      {withdrawOpen && !isAdmin && <WithdrawAccountModal onClose={() => setWithdrawOpen(false)} currentUser={currentUser} />}
      <InAppBrowserHint />
      <style>{`
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: ${COLORS.border}; border-radius: 4px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
        select { appearance: none; }
        input:focus, textarea:focus, select:focus { border-color: ${COLORS.primary} !important; outline: none; }
      `}</style>

      {/* Header */}
      <div style={styles.header}>
        <span style={{ ...styles.headerTitle, color: COLORS.primary }}>💬 트리맨더스</span>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {isAdmin && <button onClick={() => setScreen("admin")} style={{ background: "none", border: "none", color: COLORS.textMuted, cursor: "pointer", padding: 6 }} title="관리자"><Icons.Admin /></button>}
          <button onClick={() => firebase.auth().signOut()} style={{ background: "none", border: "none", color: COLORS.textMuted, cursor: "pointer", padding: 6 }} title="로그아웃"><Icons.Logout /></button>
        </div>
      </div>

      {/* Content */}
      <div style={{ ...styles.content, paddingBottom: "max(72px, calc(56px + env(safe-area-inset-bottom, 0px)))" }}>
        {activeTab === "chat" && (
          <div>
            {/* Search */}
            <div style={{ padding: "clamp(10px, 2.5vw, 14px) clamp(14px, 4vw, 22px)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "clamp(8px, 2vw, 12px) clamp(12px, 3vw, 16px)", background: COLORS.cardBg, borderRadius: 12, border: `1px solid ${COLORS.border}` }}>
                <Icons.Search />
                <input style={{ background: "none", border: "none", color: COLORS.text, fontSize: 14, outline: "none", width: "100%", fontFamily: FONT }} placeholder="채팅방 검색..." />
              </div>
            </div>
            {isAdmin && (
              <div
                style={{
                  display: "flex",
                  flexWrap: "wrap",
                  alignItems: "center",
                  gap: 8,
                  padding: "0 clamp(14px, 4vw, 22px) 12px",
                }}
              >
                {!chatListSelectMode ? (
                  <button
                    type="button"
                    onClick={() => {
                      setChatListSelectMode(true);
                      setSelectedChatRoomIds([]);
                    }}
                    style={{
                      padding: "8px 14px",
                      background: COLORS.cardBg,
                      color: COLORS.text,
                      border: `1px solid ${COLORS.border}`,
                      borderRadius: 10,
                      fontSize: 13,
                      fontWeight: 600,
                      cursor: "pointer",
                      fontFamily: FONT,
                    }}
                  >
                    선택하기
                  </button>
                ) : (
                  <>
                    <button
                      type="button"
                      onClick={() => {
                        setChatListSelectMode(false);
                        setSelectedChatRoomIds([]);
                      }}
                      style={{
                        padding: "8px 14px",
                        background: COLORS.border,
                        color: COLORS.text,
                        border: "none",
                        borderRadius: 10,
                        fontSize: 13,
                        fontWeight: 600,
                        cursor: "pointer",
                        fontFamily: FONT,
                      }}
                    >
                      취소
                    </button>
                    <button
                      type="button"
                      disabled={!selectedChatRoomIds.length}
                      onClick={deleteSelectedChatRoomsFromList}
                      style={{
                        padding: "8px 14px",
                        background: selectedChatRoomIds.length ? `${COLORS.danger}33` : COLORS.border,
                        color: selectedChatRoomIds.length ? COLORS.danger : COLORS.textMuted,
                        border: `1px solid ${selectedChatRoomIds.length ? COLORS.danger : COLORS.border}`,
                        borderRadius: 10,
                        fontSize: 13,
                        fontWeight: 700,
                        cursor: selectedChatRoomIds.length ? "pointer" : "not-allowed",
                        fontFamily: FONT,
                      }}
                    >
                      삭제 ({selectedChatRoomIds.length})
                    </button>
                    <span style={{ fontSize: 12, color: COLORS.textMuted, flex: "1 1 200px" }}>
                      1:1·그룹 채팅만 선택 가능합니다. 공지·스케줄 등은 삭제할 수 없습니다.
                    </span>
                  </>
                )}
              </div>
            )}
            {/* Chat list */}
            {visibleRooms.map((room) => {
              const cleared = currentUser?.email && isChatRoomUnreadCleared(currentUser.email, room.id);
              const badge = cleared ? 0 : room.unread;
              const canPick = isAdmin && chatListSelectMode && isChatRoomDeletableFromList(room);
              const checked = selectedChatRoomIds.includes(String(room.id));
              return (
              <div
                key={room.id}
                style={{ ...styles.chatItem, cursor: canPick ? "default" : "pointer" }}
                onClick={() => {
                  if (chatListSelectMode && isAdmin && canPick) {
                    toggleSelectChatRoom(room.id);
                    return;
                  }
                  if (chatListSelectMode) {
                    setChatListSelectMode(false);
                    setSelectedChatRoomIds([]);
                  }
                  setActiveChatRoom(room.id);
                }}
                onMouseOver={(e) => {
                  if (!chatListSelectMode) e.currentTarget.style.background = COLORS.cardBgHover;
                }}
                onMouseOut={(e) => {
                  e.currentTarget.style.background = "transparent";
                }}
              >
                {isAdmin && chatListSelectMode && (
                  <div
                    style={{ width: 40, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}
                    onClick={(e) => e.stopPropagation()}
                  >
                    {canPick ? (
                      <input
                        type="checkbox"
                        checked={checked}
                        onChange={() => toggleSelectChatRoom(room.id)}
                        style={{ width: 20, height: 20, accentColor: COLORS.primary, cursor: "pointer" }}
                      />
                    ) : (
                      <span style={{ width: 20, height: 20 }} title="고정 메뉴" />
                    )}
                  </div>
                )}
                <div style={styles.avatar()}>{room.name.split(" ")[0]}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontWeight: 600, fontSize: 15, color: COLORS.text }}>{room.name}</span>
                    <span style={{ fontSize: 12, color: COLORS.textMuted, flexShrink: 0 }}>{room.time}</span>
                  </div>
                  <div style={{ fontSize: 14, color: COLORS.textMuted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{room.lastMsg}</div>
                </div>
                {badge > 0 && !chatListSelectMode && (
                  <div style={{ minWidth: 22, height: 22, borderRadius: 11, background: COLORS.danger, color: "#fff", fontSize: 11, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 6px", flexShrink: 0 }}>
                    {badge}
                  </div>
                )}
              </div>
              );
            })}
          </div>
        )}

        {activeTab === "leave" && !isAdmin && (
          <HolidayBoard currentUser={currentUser} leaveRequests={leaveRequests} />
        )}

        {activeTab === "people" && (
          <div style={{ padding: 20 }}>
            {(() => {
              const peers = colleaguesListMerged(currentUser?.email, employeeApprovalsList);
              return (
                <>
                  <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 16, lineHeight: 1.5 }}>
                    승인된 직원·관리자 기준 <strong style={{ color: COLORS.text }}>{peers.length}명</strong> · <strong style={{ color: COLORS.text }}>1:1 채팅</strong>을 누르면 채팅 탭에 대화방이 생깁니다.
                  </div>
                  {peers.length === 0 && (
                    <div style={{ ...styles.card, fontSize: 14, color: COLORS.textMuted, lineHeight: 1.55, marginBottom: 16 }}>
                      표시할 동료가 없습니다. 상대방이 <strong style={{ color: COLORS.text }}>관리자 승인(employeeApprovals)</strong>을 받았는지, Firestore 규칙·네트워크를 확인해 주세요.
                    </div>
                  )}
                  {peers.map((u) => (
                    <div key={u.key} style={{ ...styles.card, display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
                      <div style={{ position: "relative", flexShrink: 0 }}>
                        <div style={styles.avatar(48)}>{u.avatar}</div>
                        <div
                          style={{
                            position: "absolute",
                            bottom: 2,
                            right: 2,
                            width: 10,
                            height: 10,
                            borderRadius: "50%",
                            background: u.status === "online" ? COLORS.success : u.status === "away" ? COLORS.warning : COLORS.textMuted,
                            border: `2px solid ${COLORS.cardBg}`,
                          }}
                        />
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 600, fontSize: 15, color: COLORS.text }}>{u.name}</div>
                        <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 2 }}>{u.email}</div>
                        <div style={{ fontSize: 13, color: COLORS.textMuted }}>{u.dept}</div>
                      </div>
                      <button
                        type="button"
                        onClick={() => openDirectChat(u)}
                        style={{
                          padding: "10px 16px",
                          background: COLORS.primary,
                          color: COLORS.dark,
                          border: "none",
                          borderRadius: 10,
                          fontSize: 13,
                          fontWeight: 700,
                          cursor: "pointer",
                          fontFamily: FONT,
                          flexShrink: 0,
                        }}
                      >
                        1:1 채팅
                      </button>
                    </div>
                  ))}
                </>
              );
            })()}
          </div>
        )}

        {activeTab === "more" && (
          <div style={{ padding: 20 }}>
            <div style={{ ...styles.card, display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
              <div style={styles.avatar(56)}>🧑‍💻</div>
              <div>
                <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.text }}>{currentUser?.name || "김민수"}</div>
                <div style={{ fontSize: 13, color: COLORS.textMuted }}>{currentUser?.email || "minsu@company.com"}</div>
              </div>
            </div>
            {[
              ...(isAdmin ? [{ label: "관리자 페이지", icon: <Icons.Admin />, action: () => setScreen("admin") }] : []),
              {
                label: "비밀번호 변경",
                icon: (
                  <span style={{ width: 22, height: 22, display: "flex", alignItems: "center", justifyContent: "center", color: "#c5ccd6" }}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                      <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                  </span>
                ),
                action: () => {
                  setPasswordChangeMode("optional");
                  setScreen("passwordChange");
                },
              },
              ...(!isAdmin
                ? [
                    {
                      label: "회원 탈퇴",
                      icon: <span style={{ fontSize: 18 }}>🚪</span>,
                      action: () => setWithdrawOpen(true),
                      danger: true,
                    },
                  ]
                : []),
              { label: "로그아웃", icon: <Icons.Logout />, action: () => firebase.auth().signOut(), danger: true },
            ].map((item, i) => (
              <button key={i} onClick={item.action} style={{ ...styles.card, display: "flex", alignItems: "center", gap: 14, cursor: "pointer", width: "100%", border: `1px solid ${COLORS.border}`, textAlign: "left", fontFamily: FONT }}>
                <span style={{ color: item.danger ? COLORS.danger : "#c5ccd6" }}>{item.icon}</span>
                <span style={{ fontSize: 15, color: item.danger ? COLORS.danger : COLORS.text }}>{item.label}</span>
              </button>
            ))}
          </div>
        )}
      </div>

      {/* Tab Bar */}
      <div style={styles.tabBar}>
        {[
          { id: "chat", label: "채팅", icon: <Icons.Chat /> },
          { id: "people", label: "동료", icon: <Icons.People /> },
          ...(!isAdmin ? [{ id: "leave", label: "휴무", icon: <Icons.Holiday /> }] : []),
          { id: "more", label: "더보기", icon: <Icons.Admin /> },
        ].map(t => (
          <button key={t.id} style={styles.tab(activeTab === t.id)} onClick={() => setActiveTab(t.id)}>
            {t.icon}
            <span>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TreeMandersApp />);
  </script>
</body>
</html>
