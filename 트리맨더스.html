function HolidayBoard({ currentUser, leaveRequests }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ reason: "" });
  const [pickedMap, setPickedMap] = useState({});
  const [leavePolicy, setLeavePolicy] = useState(() => getLeavePolicy());
  const [cursorYM, setCursorYM] = useState(() => {
    const t = new Date();
    return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, "0")}`;
  });

  useEffect(() => {
    const sync = () => setLeavePolicy(getLeavePolicy());
    window.addEventListener("treemanders-leave-policy-updated", sync);
    return () => window.removeEventListener("treemanders-leave-policy-updated", sync);
  }, []);

  const { minIso, maxIso } = leaveSelectableRange(leavePolicy);

  useEffect(() => {
    const minYm = minIso.slice(0, 7);
    const maxYm = maxIso.slice(0, 7);
    setCursorYM((ym) => {
      if (ym < minYm) return minYm;
      if (ym > maxYm) return maxYm;
      return ym;
    });
  }, [minIso, maxIso]);

  const onToggleDay = (iso) => {
    if (iso < minIso || iso > maxIso) {
      alert(`휴무 신청은 오늘부터 ${leavePolicy.windowDays}일 이내(포함)의 날짜만 선택할 수 있습니다.`);
      return;
    }
    setPickedMap((prev) => {
      const next = { ...prev };
      if (next[iso]) delete next[iso];
      else next[iso] = true;
      return next;
    });
  };

  const handleSubmit = () => {
    const datesIso = Object.keys(pickedMap)
      .filter((iso) => pickedMap[iso])
      .sort();
    if (!datesIso.length || !form.reason.trim()) {
      alert("휴무일을 하나 이상 선택하고 사유를 입력해주세요.");
      return;
    }
    const bad = datesIso.find((iso) => iso < minIso || iso > maxIso);
    if (bad) {
      alert(`선택한 날짜 중 신청 가능 기간을 벗어난 날이 있습니다. (${minIso} ~ ${maxIso})`);
      return;
    }
    const au = firebase.auth().currentUser;
    if (!au || !au.email) {
      alert("로그인(이메일) 정보가 없어 휴무를 저장할 수 없습니다.");
      return;
    }
    const myReqs = leaveRequests.filter((h) => !currentUser?.email || !h.userEmail || h.userEmail === currentUser.email);
    const nowSec = Math.floor(Date.now() / 1000);
    const gapSec = leavePolicy.gapDays * 86400;
    let lastAct = 0;
    myReqs.forEach((h) => {
      lastAct = Math.max(lastAct, leaveRequestLastActionSeconds(h));
    });
    if (leavePolicy.gapDays > 0 && lastAct > 0 && nowSec - lastAct < gapSec) {
      const left = Math.ceil((gapSec - (nowSec - lastAct)) / 86400);
      alert(`이전 휴무 신청·변경 후 ${leavePolicy.gapDays}일이 지나야 다시 신청할 수 있습니다. (약 ${left}일 남음)`);
      return;
    }
    const startDate = datesIso[0];
    const endDate = datesIso[datesIso.length - 1];
    firebase
      .firestore()
      .collection("leaveRequests")
      .add({
        user: currentUser?.name || "나",
        userEmail: au.email,
        userUid: au.uid || "",
        datesIso,
        startDate,
        endDate,
        reason: form.reason.trim(),
        status: "pending",
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      })
      .then(() => {
        setForm({ reason: "" });
        setPickedMap({});
        setShowForm(false);
      })
      .catch((err) => alert("휴무 신청 저장에 실패했습니다. " + (err && err.message ? err.message : String(err))));
  };

  const statusMap = { pending: { label: "대기중", color: COLORS.warning }, approved: { label: "승인됨", color: COLORS.success }, rejected: { label: "반려", color: COLORS.danger } };
  const mine = leaveRequests.filter((h) => !currentUser?.email || !h.userEmail || h.userEmail === currentUser.email);

  return (
    <div style={{ padding: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
        <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.5 }}>
          휴무 희망 · 신청 현황
          <div style={{ fontSize: 11, marginTop: 4 }}>
            신청 가능 기간: 오늘부터 {leavePolicy.windowDays}일 · 재신청 간격: {leavePolicy.gapDays}일
          </div>
        </div>
        <button onClick={() => { setShowForm(true); setPickedMap({}); }} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 16px", background: COLORS.primary, color: COLORS.dark, border: "none", borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>
          <Icons.Plus /> 휴무 희망 신청
        </button>
      </div>

      {showForm && (
        <div style={{ ...styles.card, borderColor: COLORS.primary + "44", marginBottom: 16 }}>
          <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>달력에서 휴무일 선택</div>
          <LeaveMonthPicker
            cursorYM={cursorYM}
            setCursorYM={setCursorYM}
            pickedMap={pickedMap}
            onToggleDay={onToggleDay}
            minSelectableIso={minIso}
            maxSelectableIso={maxIso}
          />
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 8 }}>
            선택된 날짜:{" "}
            {Object.keys(pickedMap).filter((k) => pickedMap[k]).sort().length
              ? Object.keys(pickedMap)
                  .filter((k) => pickedMap[k])
                  .sort()
                  .join(", ")
              : "없음"}
          </div>
          <input style={styles.input} placeholder="사유를 입력하세요 *" value={form.reason} onChange={(e) => setForm({ ...form, reason: e.target.value })} />
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <button onClick={() => setShowForm(false)} style={{ flex: 1, padding: 12, background: COLORS.border, color: COLORS.text, border: "none", borderRadius: 10, cursor: "pointer", fontFamily: FONT }}>취소</button>
            <button onClick={handleSubmit} style={{ flex: 1, padding: 12, background: COLORS.primary, color: COLORS.dark, border: "none", borderRadius: 10, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>제출</button>
          </div>
        </div>
      )}

      {mine.map((h) => {
        const st = statusMap[h.status];
        return (
          <div key={h.id} style={styles.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <span style={{ fontSize: 15, fontWeight: 600 }}>{h.user}</span>
              <span style={styles.badge(st.color)}>{st.label}</span>
            </div>
            <div style={{ fontSize: 14, color: COLORS.textMuted, marginBottom: 4 }}>📅 {leaveDisplayRange(h)}</div>
            <div style={{ fontSize: 13, color: COLORS.textMuted }}>사유: {h.reason}</div>
          </div>
        );
      })}
    </div>
  );
}

function AdminLeaveSchedule({ leaveRequests, cursorYM, setCursorYM }) {
  const [y, m] = cursorYM.split("-").map(Number);
  const dim = new Date(y, m, 0).getDate();
  const byDay = {};
  for (let d = 1; d <= dim; d++) {
    const iso = fmtYMD(new Date(y, m - 1, d));
    byDay[iso] = [];
  }
  leaveRequests.forEach((h) => {
    const list = leaveRequestDatesList(h);
    if (!list.length) return;
    list.forEach((iso) => {
      if (byDay[iso]) byDay[iso].push(h);
    });
  });

  return (
    <div style={{ ...styles.card, marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <span style={{ fontWeight: 700 }}>스케줄러</span>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button type="button" style={{ ...styles.linkBtn, color: COLORS.text }} onClick={() => {
            const d = new Date(y, m - 2, 1);
            setCursorYM(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
          }}>◀</button>
          <span style={{ fontSize: 14, fontWeight: 600 }}>{y}년 {m}월</span>
          <button type="button" style={{ ...styles.linkBtn, color: COLORS.text }} onClick={() => {
            const d = new Date(y, m, 1);
            setCursorYM(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
          }}>▶</button>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3, fontSize: 11 }}>
        {["일", "월", "화", "수", "목", "금", "토"].map((w) => <span key={w} style={{ textAlign: "center", color: COLORS.textMuted, fontWeight: 600 }}>{w}</span>)}
        {(() => {
          const first = new Date(y, m - 1, 1).getDay();
          const cells = [];
          for (let i = 0; i < first; i++) cells.push(<span key={`p-${i}`} />);
          for (let d = 1; d <= dim; d++) {
            const iso = fmtYMD(new Date(y, m - 1, d));
            const list = byDay[iso] || [];
            cells.push(
              <div key={iso} style={{ minHeight: 56, borderRadius: 8, border: `1px solid ${COLORS.border}`, padding: 4, background: COLORS.darkBg, overflow: "hidden" }}>
                <div style={{ fontWeight: 700, fontSize: 12, marginBottom: 2, color: COLORS.text }}>{d}</div>
                {list.slice(0, 3).map((h) => (
                  <div key={h.id + iso} style={{ fontSize: 10, lineHeight: 1.25, color: h.status === "approved" ? COLORS.success : h.status === "rejected" ? COLORS.danger : COLORS.warning, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {h.user}
                  </div>
                ))}
                {list.length > 3 && <div style={{ fontSize: 10, color: COLORS.textMuted }}>+{list.length - 3}</div>}
              </div>
            );
          }
          return cells;
        })()}
      </div>
      <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 10 }}>색상: 대기(노랑 계열 표시는 목록 배지와 동일) · 승인 초록 · 반려 빨강</div>
    </div>
  );
}

function adminGrantHasAny(p) {
  return !!(p && (p.members || p.notices || p.holidays || p.regions || p.jobs || p.signups || p.chatClear));
}

function AdminRoleSettings() {
  const [grants, setGrants] = useState(() => ({ ...getAdminGrantsMap() }));
  const [inp, setInp] = useState("");
  const [pickEmails, setPickEmails] = useState([]);
  const [newPerms, setNewPerms] = useState(() => defaultAdminPerms());
  const [msg, setMsg] = useState("");
  const [polWin, setPolWin] = useState(() => String(getLeavePolicy().windowDays));
  const [polGap, setPolGap] = useState(() => String(getLeavePolicy().gapDays));

  const admCanon = ADMIN_CANONICAL_EMAIL.toLowerCase();
  const rosterForPick = getEmployeeRoster()
    .map((r, i) => ({
      key: r.uid || `r-${i}`,
      name: String(r.name || "").trim() || (r.email || "").split("@")[0],
      email: String(r.email || "").toLowerCase().trim(),
    }))
    .filter((r) => r.email && r.email.includes("@") && r.email !== admCanon);

  const entries = Object.keys(grants)
    .filter((e) => e !== ADMIN_CANONICAL_EMAIL.toLowerCase())
    .sort();

  const syncSave = (next) => {
    saveAdminGrantsMap(next);
    setGrants({ ...getAdminGrantsMap() });
  };

  const setPerm = (email, key, checked) => {
    setMsg("");
    const base = getAdminGrantsMap();
    const cur = { ...defaultAdminPerms(), ...base[email] };
    cur[key] = checked;
    const next = { ...base, [email]: cur };
    if (!adminGrantHasAny(cur)) {
      delete next[email];
    }
    syncSave(next);
    setMsg("권한을 저장했습니다. 해당 계정은 다시 들어오면 반영됩니다.");
  };

  const addBatch = (rawList) => {
    setMsg("");
    const adm = ADMIN_CANONICAL_EMAIL.toLowerCase();
    const list = [...rawList].map((x) => String(x).toLowerCase().trim()).filter((e) => e && e.includes("@") && e !== adm);
    if (!list.length) {
      setMsg("가입 명단에서 직원을 선택하거나, 아래에 이메일을 입력하세요.");
      return;
    }
    if (!adminGrantHasAny(newPerms)) {
      setMsg("권한을 하나 이상 선택하세요.");
      return;
    }
    const base = getAdminGrantsMap();
    const next = { ...base };
    list.forEach((e) => {
      next[e] = { ...defaultAdminPerms(), ...newPerms };
    });
    syncSave(next);
    setInp("");
    setPickEmails([]);
    setNewPerms(defaultAdminPerms());
    setMsg(`${list.length}명에게 관리자 권한을 부여했습니다. 해당 직원은 로그아웃 후 다시 로그인하면 반영됩니다.`);
  };

  const addFromRoster = () => addBatch(pickEmails);
  const addFromEmail = () => addBatch([inp.trim()]);

  const togglePick = (em) => {
    const e = String(em).toLowerCase().trim();
    setPickEmails((prev) => (prev.includes(e) ? prev.filter((x) => x !== e) : [...prev, e]));
  };

  const remove = (em) => {
    const base = getAdminGrantsMap();
    const next = { ...base };
    delete next[em];
    syncSave(next);
    setMsg("제거했습니다.");
  };

  const savePol = () => {
    saveLeavePolicy({ windowDays: Number(polWin), gapDays: Number(polGap) });
    const p = getLeavePolicy();
    setPolWin(String(p.windowDays));
    setPolGap(String(p.gapDays));
    setMsg("휴무 신청 정책을 저장했습니다. (직원 휴무 화면에 반영)");
  };

  const chk = (perms, key, onChange) => (
    <label key={key} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: COLORS.text, cursor: "pointer", whiteSpace: "nowrap" }}>
      <input type="checkbox" checked={!!perms[key]} onChange={(e) => onChange(key, e.target.checked)} style={{ width: 16, height: 16, accentColor: COLORS.primary }} />
      {ADMIN_PERM_DEFS.find((d) => d.key === key)?.label || key}
    </label>
  );

  return (
    <div>
      <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 16, lineHeight: 1.6 }}>
        <strong style={{ color: COLORS.text }}>주 관리자</strong>(로그인 아이디 <code style={{ color: COLORS.primary }}>{ADMIN_LOCAL_LOGIN_ID}</code>)만 이 화면이 보입니다.
        체크한 메뉴만 해당 이메일 계정에 보입니다. 데이터는 이 브라우저(기기)에만 저장됩니다.
      </div>
      <div style={{ ...styles.card, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, marginBottom: 8 }}>휴무 신청 정책 (직원)</div>
        <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 12, lineHeight: 1.5 }}>
          신청 가능: 오늘부터 입력한 일수(포함)까지. 재신청 간격: 마지막 신청·변경 시각 기준 최소 일수.
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center", marginBottom: 12 }}>
          <label style={{ fontSize: 13, color: COLORS.text }}>
            신청 기간(일)
            <input type="number" min={1} max={120} value={polWin} onChange={(e) => setPolWin(e.target.value)} style={{ ...styles.input, marginTop: 4, maxWidth: 100 }} />

          </label>
          <button type="button" onClick={savePol} style={{ padding: "10px 16px", background: COLORS.primary, color: COLORS.dark, border: "none", borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: FONT, alignSelf: "flex-end" }}>
            정책 저장
          </button>
        </div>
      </div>
      <div style={{ ...styles.card, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, marginBottom: 12 }}>새 관리자 추가</div>
        <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 8 }}>가입·로그인한 직원 명단에서 선택</div>
        {rosterForPick.length === 0 ? (
          <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 12 }}>아직 명단에 직원이 없습니다. 직원이 앱에 로그인하면 여기에 표시됩니다.</div>
        ) : (
          <div style={{ maxHeight: 220, overflowY: "auto", border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 10, marginBottom: 12, background: COLORS.darkBg }}>
            {rosterForPick.map((r) => (
              <label key={r.key} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 0", cursor: "pointer", fontSize: 13, color: COLORS.text }}>
                <input type="checkbox" checked={pickEmails.includes(r.email)} onChange={() => togglePick(r.email)} style={{ width: 18, height: 18, accentColor: COLORS.primary, flexShrink: 0 }} />
                <span style={{ flex: 1, minWidth: 0 }}>
                  <strong>{r.name}</strong>
                  <span style={{ color: COLORS.textMuted, marginLeft: 8, fontSize: 12 }}>{r.email}</span>

              </label>
            ))}
          </div>
        )}
        <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 8 }}>부여할 권한</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: "10px 14px", marginBottom: 12 }}>
          {ADMIN_PERM_DEFS.map((d) => chk(newPerms, d.key, (k, v) => setNewPerms((p) => ({ ...p, [k]: v }))))}
        </div>
        <button type="button" style={{ ...styles.primaryBtn, marginTop: 0 }} onClick={addFromRoster} disabled={!rosterForPick.length}>
          선택한 직원을 관리자로 추가
        </button>
        <div style={{ fontSize: 12, color: COLORS.textMuted, margin: "16px 0 8px" }}>또는 이메일로 직접 추가 (명단에 없을 때)</div>
        <input style={styles.input} placeholder="직원 이메일 (전체 주소)" value={inp} onChange={(e) => setInp(e.target.value)} />
        <button type="button" style={{ ...styles.primaryBtn, marginTop: 10, background: COLORS.cardBg, color: COLORS.text, border: `1px solid ${COLORS.border}` }} onClick={addFromEmail}>
          이메일로 추가
        </button>
        {msg && <div style={{ marginTop: 12, fontSize: 13, color: msg.includes("제거") ? COLORS.warning : COLORS.success }}>{msg}</div>}

          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: "10px 14px" }}>
            {ADMIN_PERM_DEFS.map((d) => chk({ ...defaultAdminPerms(), ...grants[em] }, d.key, (k, v) => setPerm(em, k, v)))}

// 관리자: 지역 목록 + 월별 구역 배정 — localStorage

function parseZoneCodesFromBulk(text) {
  return [...new Set(String(text).split(/[,;\n]+/).map((s) => s.trim()).filter(Boolean))];
}

function AdminRegionDispatch({ employeeApprovalsList = [] }) {
  const [regions, setRegions] = useState(() => getSavedRegions());
  const [zoneBulkText, setZoneBulkText] = useState(() => getSavedRegions().join(", "));
  const [bulkMsg, setBulkMsg] = useState("");
  const [ym, setYm] = useState(() => {
    const t = new Date();
    return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, "0")}`;
  });
  const [assignments, setAssignments] = useState(() => getRegionAssignments());
  const [pickDay, setPickDay] = useState(null);
  const [formPersonKeys, setFormPersonKeys] = useState([]);
  const [formRegions, setFormRegions] = useState([]);
  const [formMsg, setFormMsg] = useState("");

  useEffect(() => { setPickDay(null); }, [ym]);

  const [employeeRosterTick, setEmployeeRosterTick] = useState(0);
  useEffect(() => {
    const bump = () => setEmployeeRosterTick((t) => t + 1);
    window.addEventListener("treemanders-employee-roster-updated", bump);
    const onStorage = (e) => {
      if (e.key === LS_EMPLOYEE_ROSTER) bump();
    };
    window.addEventListener("storage", onStorage);
    return () => {
      window.removeEventListener("treemanders-employee-roster-updated", bump);
      window.removeEventListener("storage", onStorage);
    };
  }, []);

  const [y, m] = ym.split("-").map(Number);
  const dim = new Date(y, m, 0).getDate();
  const wd = ["일", "월", "화", "수", "목", "금", "토"];

  const findAssign = (day, region) => assignments.find((a) => a.ym === ym && a.day === day && a.region === region);

  const assignmentsForDay = (day) => assignments.filter((a) => a.ym === ym && a.day === day);

  const dayAllFilled = (day) => {
    if (regions.length === 0) return false;
    return regions.every((r) => {
      const x = findAssign(day, r);
      return x && String(x.person || "").trim();
    });
  };

  const filledDays = Array.from({ length: dim }, (_, i) => i + 1).filter((d) => dayAllFilled(d)).length;

  const saveZoneList = () => {
    setBulkMsg("");
    const next = parseZoneCodesFromBulk(zoneBulkText);
    if (next.length === 0) {
      setBulkMsg("구역 코드를 하나 이상 입력하세요.");
      return;
    }
    setRegions(next);
    setSavedRegionsList(next);
    const rest = assignments.filter((a) => next.includes(a.region));
    setRegionAssignmentsList(rest);
    setAssignments(rest);
    setZoneBulkText(next.join(", "));
    setBulkMsg(`${next.length}개 구역을 저장했습니다. 아래 달력에서 날짜를 눌러 배정하세요.`);
    setFormRegions((prev) => {
      const kept = prev.filter((r) => next.includes(r));
      if (kept.length > 0) return kept;
      return next[0] ? [next[0]] : [];
    });
  };

  const openDay = (day) => {
    setFormMsg("");
    setFormPersonKeys([]);
    const list = assignments.filter((a) => a.ym === ym && a.day === day);
    const takenR = new Set(list.map((a) => String(a.region || "").trim()).filter(Boolean));
    const avR = regions.filter((r) => !takenR.has(r));
    setFormRegions(avR[0] ? [avR[0]] : []);
    setPickDay(day);
  };

  const employeeOptionsAll = useMemo(
    () => getRegionAssignEmployeeSelectOptions(employeeApprovalsList),
    [employeeApprovalsList, employeeRosterTick]
  );
  const selSize = (n) => Math.min(Math.max(n, 2), 8);

  const nameForKey = (k) => {
    const o = employeeOptionsAll.find((e) => e.key === k);
    return o ? String(o.name || "").trim() : "";
  };

  const saveDayAssignment = () => {
    setFormMsg("");
    if (!pickDay) return;
    const keys = formPersonKeys.filter(Boolean);
    const regs = [...new Set(formRegions.filter((r) => regions.includes(r)))];
    if (keys.length === 0) {
      setFormMsg("직원을 한 명 이상 선택하세요. (Ctrl 또는 ⌘ 키를 누른 채 클릭)");
      return;
    }
    if (regs.length === 0) {
      setFormMsg("구역을 하나 이상 선택하세요. (Ctrl 또는 ⌘ 키를 누른 채 클릭)");
      return;
    }
    const names = keys.map(nameForKey).filter(Boolean);
    if (names.length !== keys.length) {
      setFormMsg("선택한 직원 정보를 확인할 수 없습니다.");
      return;
    }
    let pairs = [];
    if (names.length === 1) {
      regs.forEach((region) => pairs.push({ person: names[0], region }));
    } else if (regs.length === 1) {
      setFormMsg("구역이 하나일 때는 직원도 한 명만 선택할 수 있습니다.");
      return;
    } else if (names.length === regs.length) {
      for (let i = 0; i < names.length; i++) pairs.push({ person: names[i], region: regs[i] });
    } else {
      setFormMsg("직원 1명 + 구역 여러 개이거나, 직원 수와 구역 수를 같게 맞춰 순서대로 짝지어 배정합니다.");
      return;
    }
    let next = [...assignments];
    for (const { region } of pairs) {
      next = next.filter((a) => !(a.ym === ym && a.day === pickDay && a.region === region));
    }
    const baseId = Date.now();
    pairs.forEach((p, i) => {
      next.push({ id: baseId + i, ym, day: pickDay, region: p.region, person: p.person, fromPlace: "" });
    });
    setRegionAssignmentsList(next);
    setAssignments(next);
    setFormMsg("");
    window.alert("저장되었습니다.");
    setPickDay(null);
  };

  const removeAssignmentsByIds = (ids) => {
    const idSet = new Set(ids);
    const next = assignments.filter((a) => !idSet.has(a.id));
    setRegionAssignmentsList(next);
    setAssignments(next);
  };

  const groupedAssignmentsForPickDay =
    pickDay == null
      ? []
      : (() => {
          const list = assignmentsForDay(pickDay);
          const byPerson = new Map();
          for (const a of list) {
            const p = String(a.person || "").trim();
            if (!p) continue;
            if (!byPerson.has(p)) byPerson.set(p, []);
            byPerson.get(p).push(a);
          }
          return [...byPerson.entries()]
            .map(([person, items]) => ({
              person,
              ids: items.map((x) => x.id),
              regionsLabel: [...new Set(items.map((x) => String(x.region || "").trim()).filter(Boolean))]
                .sort((x, y) => x.localeCompare(y, "ko"))
                .join(", "),
            }))
            .sort((a, b) => a.person.localeCompare(b.person, "ko"));
        })();

  const first = new Date(y, m - 1, 1);
  const startWeekday = first.getDay();
  const calCells = [];
  for (let i = 0; i < startWeekday; i++) calCells.push(null);
  for (let d = 1; d <= dim; d++) calCells.push(d);

  const todaysAssignList = pickDay != null ? assignmentsForDay(pickDay) : [];
  const assignedPeopleToday = new Set(todaysAssignList.map((a) => String(a.person || "").trim()).filter(Boolean));
  const assignedRegionsToday = new Set(todaysAssignList.map((a) => String(a.region || "").trim()).filter(Boolean));
  const employeeOptionsAvailable = employeeOptionsAll.filter((e) => !assignedPeopleToday.has(String(e.name || "").trim()));
  const regionsAvailable = regions.filter((r) => !assignedRegionsToday.has(r));
  const wdLongKo = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
  const pickDayWeekIdx = pickDay != null ? new Date(y, m - 1, pickDay).getDay() : 0;
  const modalDateTitle =
    pickDay != null ? `${y}년 ${m}월 ${pickDay}일 ${wdLongKo[pickDayWeekIdx]}` : "";
  const cannotAddAssignment =
    pickDay != null && (employeeOptionsAvailable.length === 0 || regionsAvailable.length === 0);

  return (
    <div>
      <div style={{ ...styles.card, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, marginBottom: 8 }}>기본 구역 코드</div>
        <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 12, lineHeight: 1.5 }}>
          코드를 <strong>쉼표</strong> 또는 <strong>줄바꿈</strong>으로 입력한 뒤 저장하면 아래에 <strong>월 달력</strong>이 열립니다. 날짜를 누르면 <strong>승인된 직원·동료</strong>(Firestore)과 <strong>로컬 로스터</strong>를 합친 목록에서 직원과 <strong>구역</strong>을 고르고 저장할 수 있습니다. (예: <code style={{ color: COLORS.primary }}>312A, 312B, 312C, 312D</code>)
        </div>
        <textarea
          style={{ ...styles.input, minHeight: 88, resize: "vertical", fontFamily: "ui-monospace, monospace", fontSize: 13 }}
          placeholder={"312A, 312B, 312C, 312D"}
          value={zoneBulkText}
          onChange={(e) => setZoneBulkText(e.target.value)}
        />
        <button type="button" style={{ ...styles.primaryBtn, marginTop: 10 }} onClick={saveZoneList}>구역 목록 저장</button>
        {bulkMsg && <div style={{ marginTop: 10, fontSize: 13, color: bulkMsg.includes("저장") ? COLORS.success : COLORS.warning }}>{bulkMsg}</div>}
        {regions.length > 0 && (
          <div style={{ marginTop: 14, fontSize: 12, color: COLORS.textMuted }}>
            사용 중인 구역: <strong style={{ color: COLORS.text }}>{regions.join(" · ")}</strong>
          </div>
        )}
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12, marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <button type="button" style={{ ...styles.linkBtn, color: COLORS.text }} onClick={() => {
            const d = new Date(y, m - 2, 1);
            setYm(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
          }}>◀</button>
          <span style={{ fontWeight: 700, fontSize: 16 }}>{y}년 {m}월</span>
          <button type="button" style={{ ...styles.linkBtn, color: COLORS.text }} onClick={() => {
            const d = new Date(y, m, 1);
            setYm(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
          }}>▶</button>
        </div>
        <div style={{ fontSize: 13, fontWeight: 600, color: filledDays === dim && dim > 0 && regions.length > 0 ? COLORS.success : COLORS.textMuted }}>
          전 구역 배정 완료일: <span style={{ color: filledDays === dim && dim > 0 && regions.length > 0 ? COLORS.success : COLORS.warning }}>{filledDays}</span> / {dim}일
        </div>
      </div>

      {regions.length === 0 ? (
        <div style={{ ...styles.card, color: COLORS.textMuted, fontSize: 14 }}>위에서 구역 코드를 저장하면 달력이 표시됩니다.</div>
      ) : (
        <div style={{ ...styles.card }}>
          <div style={{ textAlign: "center", marginBottom: 12 }}>
            <div style={{ fontWeight: 800, fontSize: 18, color: COLORS.text }}>{y}년 {m}월</div>
            <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 4 }}>각 칸의 숫자는 일(日), 아래는 요일·배정 요약입니다.</div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, textAlign: "center", fontSize: 13, fontWeight: 700, color: COLORS.textMuted, marginBottom: 8 }}>
            {wd.map((w) => <span key={w}>{w}</span>)}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
            {calCells.map((day, idx) => {
              if (day == null) return <span key={`e-${idx}`} />;
              const ok = dayAllFilled(day);
              const sub = regions.length ? `${regions.filter((r) => findAssign(day, r)?.person).length}/${regions.length}` : "";
              const calendarRows = groupRegionAssignmentsByPerson(assignmentsForDay(day));
              const titleFull = calendarRows.map((r) => (r.codes ? `${r.person} ${r.codes}` : r.person)).join("\n");
              const wday = new Date(y, m - 1, day).getDay();
              const isSun = wday === 0;
              const isSat = wday === 6;
              return (
                <button
                  key={day}
                  type="button"
                  onClick={() => openDay(day)}
                  title={titleFull || `${m}/${day} 배정`}
                  style={{
                    minHeight: calendarRows.length ? undefined : 88,
                    borderRadius: 12,
                    border: `1px solid ${ok ? COLORS.success + "66" : COLORS.danger + "55"}`,
                    background: ok ? `${COLORS.success}14` : `${COLORS.danger}12`,
                    color: isSun ? COLORS.danger : isSat ? COLORS.accentLight : COLORS.text,
                    fontSize: 16,
                    fontWeight: 700,
                    cursor: "pointer",
                    fontFamily: FONT,
                    display: "flex",
                    flexDirection: "column",
                    alignItems: "stretch",
                    justifyContent: "flex-start",
                    gap: 5,
                    padding: "10px 6px 10px",
                    alignSelf: "stretch",
                    textAlign: "left",
                  }}
                >
                  <span style={{ textAlign: "center" }}>
                    <span style={{ fontSize: 19, fontWeight: 800 }}>{day}</span>
                    <span style={{ display: "block", fontSize: 12, fontWeight: 600, color: COLORS.textMuted, marginTop: 2 }}>
                      {wd[new Date(y, m - 1, day).getDay()]}요일
                    </span>
                  </span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textAlign: "center" }}>{sub}</span>
                  {calendarRows.length > 0 ? (
                    <div style={{ width: "100%", flex: 1, minHeight: 0 }}>
                      {calendarRows.map((row, li) => (
                        <div
                          key={row.person}
                          style={{
                            fontSize: 13,
                            fontWeight: 600,
                            lineHeight: 1.5,
                            wordBreak: "keep-all",
                            marginBottom: li < calendarRows.length - 1 ? 6 : 0,
                          }}
                        >
                          <span style={{ color: COLORS.text }}>{row.person}</span>
                          {row.codes ? (
                            <>
                              <span style={{ color: COLORS.text }}> </span>
                              <CalendarAssignRowCodes codes={row.codes} fontSize={13} />
                            </>
                          ) : null}
                        </div>
                      ))}
                    </div>
                  ) : null}
                </button>
              );
            })}
          </div>
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 12, lineHeight: 1.45 }}>
            숫자는 그날 배정된 구역 수 / 전체 구역 수입니다. 각 칸에는 직원별로 <strong style={{ color: COLORS.text }}>이름 구역1,구역2</strong> 형태로 전체가 줄 단위로 표시됩니다. 초록 테두리는 모든 구역에 담당자가 있는 날입니다. 직원용 <strong style={{ color: COLORS.text }}>스케줄표</strong>에도 같은 내용이 실시간으로 반영됩니다.
          </div>
        </div>
      )}

      {pickDay != null && (
        <div style={styles.modal} onClick={() => setPickDay(null)}>
          <div style={{ ...styles.modalContent, maxWidth: 400, maxHeight: "min(90vh, 560px)", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>
            <div style={{ fontWeight: 700, marginBottom: 4, lineHeight: 1.35 }}>{modalDateTitle} · 구역 배정</div>
            <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 14, lineHeight: 1.45 }}>
              직원 목록은 <strong style={{ color: COLORS.text }}>관리자 승인(Firestore)</strong> 직원·동료와 이 기기 <strong style={{ color: COLORS.text }}>로컬 로스터</strong>를 합친 목록입니다.
              <br />
              <strong style={{ color: COLORS.text }}>여러 명·여러 구역:</strong> Windows는 <kbd style={{ opacity: 0.85 }}>Ctrl</kbd>, Mac은 <kbd style={{ opacity: 0.85 }}>⌘</kbd>를 누른 채 항목을 클릭하세요. 직원 1명 + 구역 여러 개 한 번에 저장 가능합니다. 직원 여러 명이면 구역도 같은 개수로 선택하면 순서대로 짝지어집니다.
              <br />
              <strong style={{ color: COLORS.text }}>목록 숨김:</strong> 이미 이 날짜에 배정된 직원·구역은 아래 선택 목록에서 빠집니다. 삭제하면 다시 선택할 수 있습니다. 저장하면 이 창이 닫힙니다.
            </div>

            {groupedAssignmentsForPickDay.length > 0 && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, marginBottom: 8 }}>이날 배정됨</div>
                <ul style={{ listStyle: "none", padding: 0, margin: 0, display: "flex", flexDirection: "column", gap: 8 }}>
                  {groupedAssignmentsForPickDay.map((row) => (
                    <li key={row.person} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, padding: "8px 10px", background: COLORS.darkBg, borderRadius: 10, border: `1px solid ${COLORS.border}`, fontSize: 13 }}>
                      <div style={{ minWidth: 0 }}>
                        <strong style={{ color: COLORS.text }}>{row.person}</strong>
                        <span style={{ color: COLORS.textMuted }}> · </span>
                        <span style={{ fontFamily: "ui-monospace, monospace", color: COLORS.primary }}>{row.regionsLabel || "—"}</span>
                      </div>
                      <button type="button" style={{ flexShrink: 0, padding: "6px 10px", fontSize: 11, background: `${COLORS.danger}22`, color: COLORS.danger, border: "none", borderRadius: 8, cursor: "pointer", fontFamily: FONT }} onClick={() => removeAssignmentsByIds(row.ids)}>삭제</button>
                    </li>
                  ))}
                </ul>
              </div>
            )}

            <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, marginBottom: 6 }}>
              직원 선택 (스크롤 · 다중 선택)
              <span style={{ fontWeight: 500, color: COLORS.textMuted, marginLeft: 8 }}>· 후보 {employeeOptionsAll.length}명</span>
            </div>
            {employeeOptionsAvailable.length === 0 ? (
              <div style={{ ...styles.input, marginBottom: 12, padding: 12, fontSize: 13, color: COLORS.textMuted }}>이 날짜에 추가로 배정할 수 있는 직원이 없습니다. 위에서 배정을 삭제하면 다시 나타납니다.</div>
            ) : (
              <select
                multiple
                size={selSize(Math.max(employeeOptionsAvailable.length, 2))}
                style={{ ...styles.input, width: "100%", marginBottom: 12, padding: 8, overflowY: "auto" }}
                value={formPersonKeys.filter((k) => employeeOptionsAvailable.some((e) => e.key === k))}
                onChange={(e) => setFormPersonKeys(Array.from(e.target.selectedOptions, (o) => o.value))}
              >
                {employeeOptionsAvailable.map((e) => (
                  <option key={e.key} value={e.key}>{e.name}{e.email ? ` (${e.email})` : ""}</option>
                ))}
              </select>
            )}

            <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, marginBottom: 6 }}>구역 코드 (스크롤 · 다중 선택)</div>
            {regionsAvailable.length === 0 ? (
              <div style={{ ...styles.input, marginBottom: 12, padding: 12, fontSize: 13, color: COLORS.textMuted, fontFamily: "ui-monospace, monospace" }}>남은 구역이 없습니다. 배정 삭제 후 다시 선택하세요.</div>
            ) : (
              <select
                multiple
                size={selSize(Math.max(regionsAvailable.length, 2))}
                style={{ ...styles.input, width: "100%", marginBottom: 12, padding: 8, fontFamily: "ui-monospace, monospace" }}
                value={formRegions.filter((r) => regionsAvailable.includes(r))}
                onChange={(e) => setFormRegions(Array.from(e.target.selectedOptions, (o) => o.value))}
              >
                {regionsAvailable.map((r) => (
                  <option key={r} value={r}>{r}</option>
                ))}
              </select>
            )}

            {formMsg && <div style={{ marginTop: 10, fontSize: 13, color: COLORS.warning }}>{formMsg}</div>}

            <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
              <button type="button" style={{ flex: 1, padding: 12, background: COLORS.border, color: COLORS.text, border: "none", borderRadius: 10, cursor: "pointer", fontFamily: FONT }} onClick={() => setPickDay(null)}>닫기</button>
              <button
                type="button"
                disabled={cannotAddAssignment}
                title={cannotAddAssignment ? "남은 직원·구역이 없으면 새 배정을 저장할 수 없습니다. 삭제 후 이용하세요." : ""}
                style={{
                  flex: 1,
                  padding: 12,
                  background: COLORS.primary,
                  color: COLORS.dark,
                  border: "none",
                  borderRadius: 10,
                  fontWeight: 700,
                  cursor: cannotAddAssignment ? "not-allowed" : "pointer",
                  fontFamily: FONT,
                  opacity: cannotAddAssignment ? 0.45 : 1,
                }}
                onClick={saveDayAssignment}
              >
                저장
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// 관리자: 배포 주소 저장·복사 (동료가 링크로 접속)
// ============================================================
function AdminDeployShareBlock() {
  const [url, setUrl] = useState(() => loadDeployPublicUrl());
  const [msg, setMsg] = useState("");

  const normalized = String(url).trim().replace(/\/+$/, "");
  const looksOk = normalized.startsWith("https://") || normalized.startsWith("http://");

  const onSave = () => {
    setMsg("");
    saveDeployPublicUrl(normalized);
    setUrl(loadDeployPublicUrl());
    setMsg("이 브라우저에 저장했습니다.");
    setTimeout(() => setMsg(""), 2500);
  };

  const onCopy = async () => {
    setMsg("");
    const toCopy = (looksOk ? normalized : loadDeployPublicUrl()).replace(/\/$/, "");
    if (!toCopy || !(toCopy.startsWith("http://") || toCopy.startsWith("https://"))) {
      setMsg("https:// 로 시작하는 주소를 입력하거나 「저장」한 뒤 다시 시도하세요.");
      return;
    }
    try {
      await navigator.clipboard.writeText(toCopy);
      setMsg("복사했습니다. 카톡·메일 등에 붙여 넣으면 링크로 열립니다.");
    } catch {
      try {
        const ta = document.createElement("textarea");
        ta.value = toCopy;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        setMsg("복사했습니다.");
      } catch {
        setMsg("자동 복사에 실패했습니다. 입력란에서 직접 선택해 복사하세요.");
      }
    }
  };

  const msgColor =
    msg.includes("복사") || msg.includes("저장")
      ? COLORS.success
      : msg.includes("실패") || msg.includes("입력")
        ? COLORS.warning
        : COLORS.textMuted;

  return (
    <div style={styles.card}>
      <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 8 }}>배포 주소</div>
      <div style={{ fontSize: 12, color: COLORS.textMuted, lineHeight: 1.55, marginBottom: 12 }}>
        웹에 올린 앱 주소(https)를 적고 저장하세요. 「주소 복사」로 클립보드에 담은 뒤 카톡·메일에 <strong style={{ color: COLORS.text }}>텍스트로 붙여 넣기</strong>하면 상대가 브라우저로 들어와 <strong style={{ color: COLORS.text }}>로그인 화면</strong>을 볼 수 있습니다. 직원 <strong style={{ color: COLORS.text }}>가입 인증 메일</strong>의 링크도 이 주소(끝에 <code style={{ color: COLORS.primary }}>?tm_login=1</code> 포함)로 돌아오도록 연결됩니다. Firebase 콘솔 → Authentication → 설정 → <strong style={{ color: COLORS.text }}>승인된 도메인</strong>에 이 사이트 도메인이 있어야 합니다.
      </div>
      <input
        style={{ ...styles.input, fontFamily: "ui-monospace, monospace", fontSize: 13, marginBottom: 0 }}
        placeholder="https://…"
        value={url}
        onChange={(e) => setUrl(e.target.value)}
        onFocus={(e) => (e.target.style.borderColor = COLORS.primary)}
        onBlur={(e) => (e.target.style.borderColor = COLORS.border)}
      />
      {!looksOk && normalized.length > 0 ? (
        <div style={{ marginTop: 8, fontSize: 12, color: COLORS.warning }}>http:// 또는 https:// 로 시작하는 전체 주소를 입력하세요.</div>
      ) : null}
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 14 }}>
        <button type="button" onClick={onSave} style={{ ...styles.primaryBtn, flex: 1, minWidth: 120, marginTop: 0 }}>
          저장
        </button>
        <button
          type="button"
          onClick={onCopy}
          style={{
            flex: 1,
            minWidth: 120,
            marginTop: 0,
            padding: "14px 16px",
            background: COLORS.cardBg,
            color: COLORS.text,
            border: `1px solid ${COLORS.border}`,
            borderRadius: 10,
            fontWeight: 700,
            cursor: "pointer",
            fontFamily: FONT,
            fontSize: 14,
          }}
        >
          주소 복사
        </button>
      </div>
      {msg ? <div style={{ marginTop: 12, fontSize: 13, color: msgColor, lineHeight: 1.45 }}>{msg}</div> : null}
    </div>
  );
}

function InAppBrowserHint() {
  const [show, setShow] = useState(() => {
    if (!detectInAppMessengerBrowser()) return false;
    try {
      return localStorage.getItem(LS_INAPP_HINT_DISMISSED) !== "1";
    } catch {
      return true;
    }
  });
  if (!show) return null;
  const dismiss = () => {
    try {
      localStorage.setItem(LS_INAPP_HINT_DISMISSED, "1");
    } catch (_) {}
    setShow(false);
  };
  return (

function pickInitialAdminTab(email) {
  if (isSuperAdminEmail(email)) return "roles";
  const order = ["members", "signups", "notices", "holidays", "regions", "jobs"];
  for (const id of order) {
    if (adminCanSeeAdminMenu(email, id)) return id;
  }
  return "members";
}

function formatFirestoreTimeKo(ts) {
  if (!ts || typeof ts.seconds !== "number") return "—";
  return new Date(ts.seconds * 1000).toLocaleString("ko-KR", { dateStyle: "short", timeStyle: "short" });
}

function AdminSignupApprovals() {
  const [rows, setRows] = useState([]);
  const [histFilter, setHistFilter] = useState("all");
  useEffect(() => {
    const un = firebase.firestore().collection("employeeApprovals").onSnapshot(
      (snap) => {
        const list = [];
        snap.forEach((d) => list.push({ id: d.id, ...d.data() }));
        list.sort((a, b) => {
          const ta = Math.max(a.updatedAt && typeof a.updatedAt.seconds === "number" ? a.updatedAt.seconds : 0, a.createdAt && typeof a.createdAt.seconds === "number" ? a.createdAt.seconds : 0);
          const tb = Math.max(b.updatedAt && typeof b.updatedAt.seconds === "number" ? b.updatedAt.seconds : 0, b.createdAt && typeof b.createdAt.seconds === "number" ? b.createdAt.seconds : 0);
          return tb - ta;
        });
        setRows(list);
      },
      (e) => console.error("[employeeApprovals]", e)
    );
    return () => un();
  }, []);
  const rowStatus = (r) => String(r.status || "pending");
  const counts = {
    all: rows.length,
    pending: rows.filter((r) => rowStatus(r) === "pending").length,
    approved: rows.filter((r) => rowStatus(r) === "approved").length,
    rejected: rows.filter((r) => rowStatus(r) === "rejected").length,
  };
  const filtered = rows.filter((r) => {
    if (histFilter === "all") return true;
    return rowStatus(r) === histFilter;
  });
  const setStatus = (uid, status) => {
    firebase
      .firestore()
      .collection("employeeApprovals")
      .doc(String(uid))
      .update({ status, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
      .catch((err) => alert(err.message || String(err)));
  };
  const filterBtns = [
    { id: "all", label: "전체" },
    { id: "pending", label: "대기" },
    { id: "approved", label: "승인" },
    { id: "rejected", label: "거절" },
  ];
  return (
    <div>
      <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 14, lineHeight: 1.55 }}>
        직원이 <strong style={{ color: COLORS.text }}>회원가입</strong>하면 여기에 기록됩니다. <strong style={{ color: COLORS.text }}>승인</strong> 후에만 해당 계정으로 로그인할 수 있습니다. 아래에서 <strong style={{ color: COLORS.text }}>거절·승인·대기</strong> 이력을 모두 조회할 수 있습니다. (주 관리자·권한이 있는 부관리자 계정은 자동으로 제외됩니다.)
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
        {filterBtns.map((f) => {
          const n = counts[f.id];
          const on = histFilter === f.id;
          return (
            <button
              key={f.id}
              type="button"
              onClick={() => setHistFilter(f.id)}
              style={{
                padding: "8px 14px",
                borderRadius: 999,
                border: on ? `1px solid ${COLORS.primary}` : `1px solid ${COLORS.border}`,
                background: on ? `${COLORS.primary}22` : COLORS.cardBg,
                color: on ? COLORS.text : COLORS.textMuted,
                fontWeight: 700,
                fontSize: 12,
                cursor: "pointer",
                fontFamily: FONT,
              }}
            >
              {f.label} ({n})
            </button>
          );
        })}
      </div>
      <div style={{ maxHeight: 520, overflowY: "auto", paddingRight: 6 }}>
        {filtered.length === 0 ? (
          <div style={{ ...styles.card, color: COLORS.textMuted, fontSize: 14 }}>해당 조건의 기록이 없습니다.</div>
        ) : (
          filtered.map((r) => {
            const st = rowStatus(r);
            const badgeColor = st === "approved" ? COLORS.success : st === "rejected" ? COLORS.danger : COLORS.warning;
            const badgeLabel = st === "approved" ? "승인됨" : st === "rejected" ? "거절" : "승인 대기";
            return (
              <div key={r.id} style={{ ...styles.card, marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, marginBottom: 8 }}>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{String(r.displayName || r.email || "").trim() || "이름 없음"}</div>
                    <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 4, wordBreak: "break-all" }}>{String(r.email || "")}</div>
                  </div>
                  <span style={styles.badge(badgeColor)}>{badgeLabel}</span>
                </div>
                <div style={{ fontSize: 11, color: COLORS.textMuted, lineHeight: 1.6, marginBottom: st === "pending" ? 12 : 0 }}>
                  <div>가입 신청: {formatFirestoreTimeKo(r.createdAt)}</div>
                  <div>처리 시각: {st === "pending" ? "—" : formatFirestoreTimeKo(r.updatedAt)}</div>
                  <div style={{ fontFamily: "ui-monospace, monospace", wordBreak: "break-all", marginTop: 4 }}>UID: {r.id}</div>
                </div>
                {st === "pending" ? (
                  <div style={{ display: "flex", gap: 8 }}>
                    <button
                      type="button"
                      onClick={() => setStatus(r.id, "approved")}
                      style={{ flex: 1, padding: 10, background: COLORS.success, color: "#fff", border: "none", borderRadius: 8, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}
                    >
                      승인
                    </button>
                    <button
                      type="button"
                      onClick={() => {
                        if (window.confirm("이 가입 신청을 거절할까요?")) setStatus(r.id, "rejected");
                      }}
                      style={{ flex: 1, padding: 10, background: COLORS.danger, color: "#fff", border: "none", borderRadius: 8, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}
                    >
                      거절
                    </button>
                  </div>
                ) : null}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

      ) : (
        roster.map((r) => {
          const em = String(r.email || "").toLowerCase().trim();
          if (!em) return null;
          const fixed = (fixedOffByEmail[em] && fixedOffByEmail[em].fixedWeeklyOff) || [];
          const sel = new Set(fixed);
          return (
            <div key={em} style={{ ...styles.card, marginBottom: 12 }}>
              <div style={{ fontWeight: 700, marginBottom: 8 }}>{r.name || em.split("@")[0]}</div>
              <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 8 }}>{em}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {DOW_LABELS_KO.map((label, dow) => (
                  <button
                    key={dow}
                    type="button"
                    onClick={() => {
                      const next = new Set(sel);
                      if (next.has(dow)) next.delete(dow);
                      else next.add(dow);
                      const arr = [...next].filter((n) => n >= 0 && n <= 6).sort((a, b) => a - b);
                      firebase.firestore().collection("employeeFixedOff").doc(firestoreEmailDocId(em)).set(
                        {
                          email: em,
                          userName: r.name || "",
                          fixedWeeklyOff: arr,
                          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        },
                        { merge: true }
                      );
                    }}
                    style={{
                      padding: "6px 10px",
                      borderRadius: 8,
                      border: `1px solid ${sel.has(dow) ? COLORS.primary : COLORS.border}`,
                      background: sel.has(dow) ? `${COLORS.primary}33` : COLORS.darkBg,
                      color: COLORS.text,
                      fontFamily: FONT,
                      fontSize: 12,
                      cursor: "pointer",
                    }}
                  >
                    {label}
                  </button>
                ))}
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

function AdminPanel({ onBack, leaveRequests, actorEmail, fixedOffByEmail, employeeApprovalsList = [] }) {

  useEffect(() => {

    return () => window.removeEventListener("treemanders-admin-grants-updated", h);
  }, []);

  const menus = useMemo(() => {
    void grantRev;
    const items = [];
    if (showRoleMenu) items.push({ id: "roles", label: "관리자 지정", icon: <Icons.Admin /> });
    if (adminCanSeeAdminMenu(actorEmail, "members")) items.push({ id: "members", label: "직원 관리", icon: <Icons.People /> });
    if (adminCanSeeAdminMenu(actorEmail, "notices")) items.push({ id: "notices", label: "공지사항 관리", icon: <Icons.Notice /> });
    if (adminCanSeeAdminMenu(actorEmail, "holidays")) items.push({ id: "holidays", label: "휴무 승인", icon: <Icons.Holiday /> });
    if (adminCanSeeAdminMenu(actorEmail, "regions")) items.push({ id: "regions", label: "구역 배정", icon: <Icons.MapPin /> });
    if (adminCanSeeAdminMenu(actorEmail, "jobs")) items.push({ id: "jobs", label: "구인 공고", icon: <Icons.Briefcase /> });
    if (adminCanSeeAdminMenu(actorEmail, "signups")) items.push({ id: "signups", label: "가입 승인", icon: <Icons.People /> });
    return items;
  }, [showRoleMenu, actorEmail, grantRev]);

  const [activeMenu, setActiveMenu] = useState(() => pickInitialAdminTab(actorEmail));
  const [jobs, setJobs] = useState(() => getJobsList());
  const [showJobForm, setShowJobForm] = useState(false);
  const [jobDetail, setJobDetail] = useState(null);
  const [jobDetailEditMode, setJobDetailEditMode] = useState(false);
  const [detailEditForm, setDetailEditForm] = useState(() => emptyJobForm());
  const [jobForm, setJobForm] = useState(() => emptyJobForm());
  const [holidaySubTab, setHolidaySubTab] = useState("schedule");
  const [schedYM, setSchedYM] = useState(() => {
    const t = new Date();
    return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, "0")}`;
  });

  useEffect(() => {
    if (activeMenu === "jobs") setJobs(getJobsList());
  }, [activeMenu]);

  const handleCreateJob = () => {
    if (!String(jobForm.courier || "").trim() && !String(jobForm.camp || "").trim()) {
      alert("택배사 또는 캠프 중 하나 이상을 입력해주세요.");
      return;
    }
    const newJob = normalizeJob({
      id: Date.now(),
      ...jobForm,
      createdAt: new Date().toISOString(),
    });
    const next = [newJob, ...jobs];
    setJobs(next);
    saveJobsList(next);
    setJobForm(emptyJobForm());
    setShowJobForm(false);
    setJobDetail(newJob);
    setJobDetailEditMode(false);
  };

  const handleUpdateJobFromDetail = () => {
    if (!jobDetail) return;
    if (!String(detailEditForm.courier || "").trim() && !String(detailEditForm.camp || "").trim()) {
      alert("택배사 또는 캠프 중 하나 이상을 입력해주세요.");
      return;
    }
    const updated = normalizeJob({
      id: jobDetail.id,
      ...detailEditForm,
      createdAt: jobDetail.createdAt || new Date().toISOString(),
    });
    const next = jobs.map((j) => (j.id === updated.id ? updated : j));
    setJobs(next);
    saveJobsList(next);
    setJobDetail(updated);
    setJobDetailEditMode(false);
  };

  const handleDeleteJobFromDetail = () => {
    if (!jobDetail) return;
    if (!window.confirm("이 공고를 삭제할까요? 삭제 후에는 복구할 수 없습니다.")) return;
    const next = jobs.filter((j) => j.id !== jobDetail.id);
    setJobs(next);
    saveJobsList(next);
    setJobDetail(null);
    setJobDetailEditMode(false);
  };

  const handleApprove = (id) => {
    firebase.firestore().collection("leaveRequests").doc(String(id)).update({
      status: "approved",
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  };
  const handleReject = (id) => {
    firebase.firestore().collection("leaveRequests").doc(String(id)).update({
      status: "rejected",
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  };

  useEffect(() => {
    if (!menus.length) return;
    if (!menus.some((m) => m.id === activeMenu)) setActiveMenu(menus[0].id);
  }, [menus, activeMenu]);

  return (
    <div style={{ display: "flex", flex: 1, minHeight: 0, width: "100%", height: "100%", flexDirection: "column" }}>
      <InAppBrowserHint />
      <div style={styles.header}>
        <button onClick={onBack} style={{ background: "none", border: "none", color: COLORS.text, cursor: "pointer", padding: 4 }}><Icons.Back /></button>
        <span style={{ fontWeight: 700, fontSize: 16 }}>관리자 패널</span>
        <div style={{ width: 30 }} />
      </div>
      <div style={{ padding: "10px clamp(12px, 3vw, 20px) 0", flexShrink: 0 }}>
        <AdminDeployShareBlock />
      </div>
      <div style={{ display: "flex", flex: 1, overflow: "hidden", minHeight: 0 }}>
        <div style={{ width: "100%", display: "flex", flexDirection: "column", minHeight: 0 }}>
          {/* Mobile horizontal tabs */}
          <div style={{ display: "flex", overflowX: "auto", borderBottom: `1px solid ${COLORS.border}`, padding: "0 8px", gap: 0, flexShrink: 0 }}>
            {menus.map(m => (
              <button key={m.id} onClick={() => setActiveMenu(m.id)} style={{
                padding: "12px 16px", border: "none", background: "none", fontFamily: FONT, fontSize: 12, fontWeight: activeMenu === m.id ? 700 : 400,
                color: activeMenu === m.id ? COLORS.primary : COLORS.textMuted, cursor: "pointer", whiteSpace: "nowrap",
                borderBottom: activeMenu === m.id ? `2px solid ${COLORS.primary}` : "2px solid transparent",
