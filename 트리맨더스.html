/** 로그인 시 이메일 칸에 넣는 관리자 아이디 (Firebase는 이메일 형식 필요 → 내부적으로 @ 도메인을 붙임) */
const ADMIN_LOCAL_LOGIN_ID = "trmendous";
/** 관리자 계정 Firebase 이메일 — 콘솔에서 이 주소로 사용자를 만들거나, 앱에서 한 번 회원가입하세요. 비밀번호 예: 123456 */
const ADMIN_CANONICAL_EMAIL = "trmendous@treemanders.internal";
const LS_EXTRA_ADMINS = "treemanders_admin_emails";
const LS_ADMIN_GRANTS = "treemanders_admin_grants";
const LS_LEAVE_POLICY = "treemanders_leave_policy";

/** 휴무 신청: 오늘부터 windowDays일(포함) 안의 날짜만 선택. gapDays: 직전 신청·변경 후 최소 간격(일). */
function getLeavePolicy() {
  const def = { windowDays: 30, gapDays: 14 };
  try {
    const r = localStorage.getItem(LS_LEAVE_POLICY);
    if (!r) return def;
    const o = JSON.parse(r);
    return {
      windowDays: Math.min(120, Math.max(1, Number(o.windowDays) || def.windowDays)),
      gapDays: Math.min(90, Math.max(0, Number(o.gapDays) || def.gapDays)),
    };
  } catch {
    return def;
  }
}

function saveLeavePolicy(partial) {
  const cur = getLeavePolicy();
  const next = {
    windowDays: partial.windowDays != null ? Number(partial.windowDays) : cur.windowDays,
    gapDays: partial.gapDays != null ? Number(partial.gapDays) : cur.gapDays,
  };
  next.windowDays = Math.min(120, Math.max(1, next.windowDays || 30));
  next.gapDays = Math.min(90, Math.max(0, next.gapDays || 14));
  localStorage.setItem(LS_LEAVE_POLICY, JSON.stringify(next));
  try {
    window.dispatchEvent(new CustomEvent("treemanders-leave-policy-updated"));
  } catch (_) {}
}

function leaveSelectableRange(policy) {
  const p = policy || getLeavePolicy();
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const minIso = fmtYMD(today);
  const maxD = new Date(today.getTime());
  maxD.setDate(maxD.getDate() + Math.max(0, p.windowDays - 1));
  const maxIso = fmtYMD(maxD);
  return { minIso, maxIso };
}

function leaveRequestLastActionSeconds(h) {
  if (!h) return 0;
  const ca = h.createdAt && typeof h.createdAt.seconds === "number" ? h.createdAt.seconds : 0;
  const ua = h.updatedAt && typeof h.updatedAt.seconds === "number" ? h.updatedAt.seconds : 0;
  return Math.max(ca, ua);
}

const ADMIN_PERM_DEFS = [
  { key: "members", label: "직원 관리" },
  { key: "notices", label: "공지사항" },
  { key: "holidays", label: "휴무·스케줄" },
  { key: "regions", label: "구역 배정" },
  { key: "jobs", label: "구인 공고" },
  { key: "signups", label: "가입 승인" },
  { key: "chatClear", label: "채팅 기록 삭제" },
];

function defaultAdminPerms() {
  return { members: true, notices: true, holidays: true, regions: true, jobs: false, signups: false, chatClear: false };
}

function readLegacyExtraAdminList() {
  try {
    const raw = localStorage.getItem(LS_EXTRA_ADMINS);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr.map((e) => String(e).toLowerCase().trim()).filter(Boolean) : [];
  } catch {
    return [];
  }
}

function normalizeGrantsMap(o) {
  const out = {};
  if (!o || typeof o !== "object" || Array.isArray(o)) return out;
  Object.keys(o).forEach((k) => {
    const em = String(k).toLowerCase().trim();
    const p = o[k];
    if (!em || typeof p !== "object") return;
    out[em] = {
      members: !!p.members,
      notices: !!p.notices,
      holidays: !!p.holidays,
      regions: !!p.regions,
      jobs: !!p.jobs,
      signups: !!p.signups,
      chatClear: !!p.chatClear,
    };
  });
  return out;
}

function saveAdminGrantsMap(map) {
  const n = normalizeGrantsMap(map);
  localStorage.setItem(LS_ADMIN_GRANTS, JSON.stringify(n));
  const emails = Object.keys(n).filter((e) => {
    const p = n[e];
    return p && (p.members || p.notices || p.holidays || p.regions || p.jobs || p.signups || p.chatClear);
  });
  localStorage.setItem(LS_EXTRA_ADMINS, JSON.stringify(emails));
  try {
    window.dispatchEvent(new CustomEvent("treemanders-admin-grants-updated"));
  } catch (_) {}
}

function getAdminGrantsMap() {
  const rawNull = localStorage.getItem(LS_ADMIN_GRANTS);
  if (rawNull !== null) {
    try {
      const o = JSON.parse(rawNull);
      if (o && typeof o === "object" && !Array.isArray(o)) return normalizeGrantsMap(o);
    } catch {
      return {};
    }
    return {};
  }
  const legacy = {};
  readLegacyExtraAdminList().forEach((e) => {
    if (e && e !== ADMIN_CANONICAL_EMAIL.toLowerCase()) legacy[e] = defaultAdminPerms();
  });
  saveAdminGrantsMap(legacy);
  return normalizeGrantsMap(legacy);
}

function getExtraAdminEmails() {
  const map = getAdminGrantsMap();
  return Object.keys(map).filter((e) => {
    const p = map[e];
    return p && (p.members || p.notices || p.holidays || p.regions || p.jobs || p.signups || p.chatClear);
  });
}

function adminHasPerm(email, permKey) {
  if (!email || !permKey) return false;
  if (isSuperAdminEmail(email)) return true;
  const p = getAdminGrantsMap()[email.toLowerCase().trim()];
  if (!p) return false;
  return !!p[permKey];
}

function adminCanSeeAdminMenu(email, menuId) {
  if (menuId === "roles") return isSuperAdminEmail(email);
  const perm = { members: "members", notices: "notices", holidays: "holidays", regions: "regions", jobs: "jobs", signups: "signups" }[menuId];
  if (!perm) return false;
  return adminHasPerm(email, perm);
}

const LS_EMPLOYEE_ROSTER = "treemanders_employee_roster";
const LS_DEPLOY_PUBLIC_URL = "treemanders_deploy_public_url";
const DEFAULT_DEPLOY_PUBLIC_URL = "https://company-chat-c7944.web.app";

function loadDeployPublicUrl() {
  try {
    const v = localStorage.getItem(LS_DEPLOY_PUBLIC_URL);
    if (v === null) return DEFAULT_DEPLOY_PUBLIC_URL;
    const t = String(v).trim();
    if (!t) return DEFAULT_DEPLOY_PUBLIC_URL;
    return t.replace(/\/$/, "");
  } catch {
    return DEFAULT_DEPLOY_PUBLIC_URL;
  }
}

function saveDeployPublicUrl(url) {
  try {
    let raw = String(url || "").trim().replace(/\/+$/, "");
    if (!raw) {
      localStorage.removeItem(LS_DEPLOY_PUBLIC_URL);
      return;
    }
    let pid = "company-chat-c7944";
    try {
      if (typeof window !== "undefined" && window.firebaseApp && window.firebaseApp.options && window.firebaseApp.options.projectId) {
        pid = String(window.firebaseApp.options.projectId);
      }
    } catch (_) {}
    const fallback = `https://${pid}.web.app`;
    if (!/^https?:\/\//i.test(raw)) raw = "https://" + raw.replace(/^\/+/, "");
    let out = fallback;
    try {
      const u = new URL(raw);
      const h = u.hostname.toLowerCase();
      const isLocal = h === "localhost" || h === "127.0.0.1";
      if (!isLocal && u.protocol !== "https:") out = fallback;
      else if (!isLocal && h !== `${pid}.web.app` && h !== `${pid}.firebaseapp.com`) out = fallback;
      else out = `${u.protocol}//${u.host}`.replace(/\/+$/, "");
    } catch {
      out = fallback;
    }
    localStorage.setItem(LS_DEPLOY_PUBLIC_URL, out);
  } catch (_) {}
}

const LS_REMEMBER_LOGIN_ID = "treemanders_remember_login_id";
const REMEMBER_LOGIN_TTL_MS = 24 * 60 * 60 * 1000;

function loadRememberedLoginId() {
  try {
    const raw = localStorage.getItem(LS_REMEMBER_LOGIN_ID);
    if (!raw) return { id: "", valid: false };
    const o = JSON.parse(raw);
    const savedAt = Number(o.savedAt);
    const id = String(o.email || "").trim();
    if (!id || !Number.isFinite(savedAt)) {
      localStorage.removeItem(LS_REMEMBER_LOGIN_ID);
      return { id: "", valid: false };
    }
    if (Date.now() - savedAt > REMEMBER_LOGIN_TTL_MS) {
      localStorage.removeItem(LS_REMEMBER_LOGIN_ID);
      return { id: "", valid: false };
    }
    return { id, valid: true };
  } catch {
    return { id: "", valid: false };
  }
}

function saveRememberedLoginId(rawInput) {
  try {
    localStorage.setItem(
      LS_REMEMBER_LOGIN_ID,
      JSON.stringify({ email: String(rawInput || "").trim(), savedAt: Date.now() })
    );
  } catch (_) {}
}

function clearRememberedLoginId() {
  try {
    localStorage.removeItem(LS_REMEMBER_LOGIN_ID);
  } catch (_) {}
}

function getFirebaseProjectIdForUrl() {
  try {
    if (typeof window !== "undefined" && window.firebaseApp && window.firebaseApp.options && window.firebaseApp.options.projectId) {
      return String(window.firebaseApp.options.projectId);
    }
  } catch (_) {}
  return "company-chat-c7944";
}

/**
 * 이메일 인증 링크의 continueUrl. Firebase에 등록된 도메인만 허용(오타·http·타 도메인이면 기본 호스팅 URL로 대체).
 * 관리자 「배포 주소」와 다르면 인증 메일이 안 오거나 링크가 막힐 수 있습니다.
 */
function getEmailVerificationContinueUrl() {
  const pid = getFirebaseProjectIdForUrl();
  const fallback = `https://${pid}.web.app`.replace(/\/+$/, "");
  let base = String(loadDeployPublicUrl() || "").trim().replace(/\/+$/, "");
  if (!/^https?:\/\//i.test(base)) base = fallback;
  try {
    const u = new URL(base);
    const h = u.hostname.toLowerCase();
    const isLocal = h === "localhost" || h === "127.0.0.1";
    if (!isLocal && u.protocol !== "https:") {
      base = fallback;
    } else {
      const allowed =
        h === `${pid}.web.app` ||
        h === `${pid}.firebaseapp.com` ||
        isLocal;
      if (!allowed) base = fallback;
    }
  } catch {
    base = fallback;
  }
  return `${base.replace(/\/+$/, "")}/?tm_login=1`;
}

function applyAuthLanguageKo() {
  try {
    firebase.auth().languageCode = "ko";
  } catch (_) {}
}

async function checkSignupApproved(uid, email) {
  if (isSuperAdminEmail(email) || isAdminEmail(email)) return { approved: true };
  try {
    const snap = await firebase.firestore().collection("employeeApprovals").doc(String(uid)).get();
    if (!snap.exists) return { approved: true };
    const d = snap.data() || {};
    const st = String(d.status || "pending");
    if (st === "approved") return { approved: true };
    if (st === "rejected") return { approved: false, message: "가입이 거절되었습니다. 관리자에게 문의하세요." };
    return { approved: false, message: "관리자 승인 대기 중입니다. 이메일 인증을 완료한 뒤, 승인되면 로그인할 수 있습니다." };
  } catch (e) {
    console.error("[employeeApprovals]", e);
    return { approved: false, message: "가입 상태를 확인할 수 없습니다. 네트워크를 확인하거나 잠시 후 다시 시도하세요." };
  }
}

function getEmployeeRoster() {
  try {
    const r = localStorage.getItem(LS_EMPLOYEE_ROSTER);
    if (!r) return [];
    const a = JSON.parse(r);
    return Array.isArray(a) ? a.filter((x) => x && (x.email || x.name)) : [];
  } catch {
    return [];
  }
}

function mergeEmployeeRoster(entry) {
  const uid = entry.uid || "";
  const email = String(entry.email || "").toLowerCase().trim();
  const name = String(entry.name || "").trim() || (email ? email.split("@")[0] : "");
  if (!email && !uid) return getEmployeeRoster();
  let list = getEmployeeRoster();
  const idx = list.findIndex((x) => (uid && x.uid === uid) || (email && String(x.email || "").toLowerCase() === email));
  const row = { uid, name, email: entry.email || email };
  if (idx >= 0) list[idx] = { ...list[idx], ...row };
  else list.push(row);
  localStorage.setItem(LS_EMPLOYEE_ROSTER, JSON.stringify(list));
  try {
    window.dispatchEvent(new CustomEvent("treemanders-employee-roster-updated"));
  } catch (_) {}
  return list;
}

function getAdminEmployeeSelectOptions() {
  const roster = getEmployeeRoster();
  return roster.map((r, i) => ({ key: r.uid || `r-${i}`, name: r.name || r.email, email: r.email || "", fromRoster: true }));
}

/**
 * 구역 배정·스케줄 직원명: Firestore 승인 직원(동료) + 로컬 로스터 + 부관리자 이메일.
 * 로컬 로스터만 쓰면 다른 PC에서만 가입한 직원이 빠집니다.
 */
function getRegionAssignEmployeeSelectOptions(employeeApprovalDocs) {
  const byEmail = new Map();

  (employeeApprovalDocs || []).forEach((row) => {
    const st = String(row.status || "pending").toLowerCase().trim();
    if (st !== "approved") return;
    const email = String(row.email || row.userEmail || "").toLowerCase().trim();
    if (!email) return;
    const name = String(row.displayName || "").trim() || email.split("@")[0];
    const key = String(row.id || email);
    byEmail.set(email, { key, name, email: row.email || email });
  });

  getEmployeeRoster().forEach((r, i) => {
    const email = String(r.email || "").toLowerCase().trim();
    if (!email) return;
    const name = String(r.name || "").trim() || email.split("@")[0];
    const prev = byEmail.get(email);
    if (prev) {
      byEmail.set(email, {
        ...prev,
        name: name || prev.name,
        key: r.uid ? String(r.uid) : prev.key,
      });
    } else {
      byEmail.set(email, { key: r.uid || `roster-${i}-${email}`, name, email: r.email || email });
    }
  });

  allAdminEmails().forEach((adminEm) => {
    const em = String(adminEm || "").toLowerCase().trim();
    if (!em) return;
    if (byEmail.has(em)) return;
    byEmail.set(em, {
      key: `admin-${em}`,
      name: em.split("@")[0],

const PASSWORD_MIN_LENGTH = 10;
const PASSWORD_ROTATION_DAYS_MS = 90 * 24 * 60 * 60 * 1000;

function validatePasswordStrength(password) {
  const pw = String(password || "");
  if (pw.length < PASSWORD_MIN_LENGTH) {
    return { ok: false, message: `비밀번호는 ${PASSWORD_MIN_LENGTH}자 이상이어야 합니다.` };
  }
  if (!/[a-z]/.test(pw)) return { ok: false, message: "영문 소문자를 포함해 주세요." };
  if (!/[A-Z]/.test(pw)) return { ok: false, message: "영문 대문자를 포함해 주세요." };
  if (!/[0-9]/.test(pw)) return { ok: false, message: "숫자를 포함해 주세요." };
  if (!/[^A-Za-z0-9]/.test(pw)) return { ok: false, message: "특수문자(예: !@# 또는 기호)를 포함해 주세요." };
  return { ok: true };
}

function passwordMetaRef(uid) {
  return firebase.firestore().collection("userPasswordMeta").doc(String(uid));
}

/** 주 관리자 제외. 메타 없으면 생성 후 만료 아님으로 간주(기존 계정 90일 카운트 시작). */
async function ensurePasswordMetaAndCheckExpired(uid, email) {
  if (isSuperAdminEmail(email)) return { expired: false };
  const ref = passwordMetaRef(uid);
  const snap = await ref.get();
  const now = Date.now();
  if (!snap.exists) {
    await ref.set({ passwordUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    return { expired: false };
  }
  const d = snap.data() || {};
  const ts = d.passwordUpdatedAt;
  if (!ts || typeof ts.seconds !== "number") {
    await ref.set({ passwordUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
    return { expired: false };
  }
  const ageMs = now - ts.seconds * 1000;
  return { expired: ageMs > PASSWORD_ROTATION_DAYS_MS };
}

function touchPasswordUpdatedAt(uid) {
  return passwordMetaRef(uid).set({ passwordUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
}

function leaveDisplayRange(h) {

}

/** 채팅 탭 목록의 「휴무 계획」 한 줄: 직원은 본인 신청만, 관리자는 전체 최신 */
function buildHolidayChatListRow(leaveRequests, currentUserEmail, isAdmin) {
  const base = { id: "holiday", name: "🌴 휴무 계획", type: "holiday" };
  const em = String(currentUserEmail || "").toLowerCase().trim();

  if (isAdmin) {
    const sorted = sortLeaveRequestsByCreatedDesc(leaveRequests);
    const latest = sorted[0];
    if (!latest) {
      return { ...base, lastMsg: "휴무 신청이 아직 없습니다", time: "—", unread: 0 };
    }
    const who = String(latest.user || "").trim() || String(latest.userEmail || "").split("@")[0] || "직원";
    const range = leaveDisplayRange(latest) || "일정";
    const preview = `${who}님 · ${range}`;
    const time =
      latest.createdAt && typeof latest.createdAt.seconds === "number"
        ? new Date(latest.createdAt.seconds * 1000).toLocaleString("ko", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" })
        : "최근";
    const pendingCount = (leaveRequests || []).filter((h) => h.status === "pending").length;
    const unread = pendingCount > 9 ? 9 : pendingCount;
    return { ...base, lastMsg: preview, time, unread };
  }

  const mine = (leaveRequests || []).filter((h) => em && String(h.userEmail || "").toLowerCase().trim() === em);
  const sortedMine = sortLeaveRequestsByCreatedDesc(mine);
  const latestMine = sortedMine[0];
  if (!latestMine) {
    return { ...base, lastMsg: "내무만 이곳에서 신청·확인합니다", time: "안내", unread: 0 };
  }
  const stLabel = latestMine.status === "approved" ? "승인" : latestMine.status === "rejected" ? "반려" : "대기";
  const preview = `내 휴무 · ${leaveDisplayRange(latestMine) || "일정"} (${stLabel})`;
  const time =
    latestMine.createdAt && typeof latestMine.createdAt.seconds === "number"
      ? new Date(latestMine.createdAt.seconds * 1000).toLocaleString("ko", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" })
      : "최근";
  const unread = sortedMine.some((h) => h.status === "pending") ? 1 : 0;
  return { ...base, lastMsg: preview, time, unread };
}

function parseISODateLocal(iso) {
  if (!iso) return null;
  const [y, mo, d] = iso.split("-").map(Number);
  return new Date(y, mo - 1, d);
}

function fmtYMD(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function monthHasSelectableDay(year, month1to12, minIso, maxIso) {
  if (!minIso || !maxIso) return true;
  const dim = new Date(year, month1to12, 0).getDate();
  for (let day = 1; day <= dim; day++) {
    const iso = fmtYMD(new Date(year, month1to12 - 1, day));
    if (iso >= minIso && iso <= maxIso) return true;
  }
  return false;
}

function eachDateInRange(startIso, endIso) {
  const out = [];
  const a = parseISODateLocal(startIso);
  const b = parseISODateLocal(endIso || startIso);
  if (!a || !b) return out;
  for (let x = new Date(a.getTime()); x <= b; x.setDate(x.getDate() + 1)) {
    out.push(fmtYMD(x));
  }
  return out;
}

const DOW_LABELS_KO = ["일", "월", "화", "수", "목", "금", "토"];

function formatFixedWeeklyOffDays(arr) {
  if (!arr || !arr.length) return "없음";
  return [...new Set(arr.map((n) => Number(n)).filter((n) => n >= 0 && n <= 6))]
    .sort((a, b) => a - b)
    .map((d) => DOW_LABELS_KO[d])
    .join(", ");
}

function computeMonthlyFairnessRow(email, displayName, fixedWeeklyOff, leaveRequests, y, m) {
  const dim = new Date(y, m, 0).getDate();
  const fixedSet = new Set((fixedWeeklyOff || []).map((n) => Number(n)).filter((n) => n >= 0 && n <= 6));
  let potentialWork = 0;
  for (let d = 1; d <= dim; d++) {
    const dow = new Date(y, m - 1, d).getDay();
    if (!fixedSet.has(dow)) potentialWork++;
  }
  const em = String(email || "").toLowerCase().trim();
  const approvedSet = new Set();
  for (const h of leaveRequests || []) {
    if (h.status !== "approved") continue;
    if (String(h.userEmail || "").toLowerCase().trim() !== em) continue;
    leaveRequestDatesList(h).forEach((iso) => {
      const parts = iso.split("-").map(Number);
      if (parts[0] === y && parts[1] === m) approvedSet.add(iso);
    });
  }
  let weekendLeave = 0;
  let fairLeave = 0;
  for (const iso of approvedSet) {
    const dt = parseISODateLocal(iso);
    if (!dt) continue;
    const dow = dt.getDay();
    if (dow === 0 || dow === 6) weekendLeave++;
    if (!fixedSet.has(dow)) fairLeave++;
  }
  const workDays = Math.max(0, potentialWork - fairLeave);
  return {
    email: em,
    displayName: displayName || em.split("@")[0],
    fixedLabel: formatFixedWeeklyOffDays(fixedWeeklyOff),
    totalApproved: approvedSet.size,
    weekendLeave,
    fairLeave,
    workDays,
    potentialWork,
  };
}

async function deleteEmployeeFirestorePresence(uid, email) {
  const db = firebase.firestore();
  const batches = [];
  let batch = db.batch();
  let n = 0;
  const enqueue = (ref) => {
    batch.delete(ref);
    n++;
    if (n >= 450) {
      batches.push(batch.commit());
      batch = db.batch();
      n = 0;
    }
  };
  enqueue(db.collection("employeeApprovals").doc(String(uid)));
  const lrSnap = await db.collection("leaveRequests").where("userEmail", "==", email).get();
  lrSnap.forEach((d) => enqueue(d.ref));
  enqueue(db.collection("employeeFixedOff").doc(firestoreEmailDocId(email)));
  if (n > 0) batches.push(batch.commit());
  await Promise.all(batches);
}

/**
 * 동료 목록: Firestore employeeApprovals 중 승인된 계정 + 관리자 이메일 + 로컬 로스터(이름 보강).
 * 로컬 로스터만 쓰면 다른 기기에서만 로그인한 직원이 안 보이므로 Firestore를 반드시 합칩니다.
 */
function colleaguesListMerged(currentEmail, employeeApprovalDocs) {
  const me = String(currentEmail || "").toLowerCase().trim();
  const byEmail = new Map();

  (employeeApprovalDocs || []).forEach((row) => {
    if (String(row.status || "pending") !== "approved") return;
    const email = String(row.email || "").toLowerCase().trim();
    if (!email || email === me) return;
    const name = String(row.displayName || "").trim() || email.split("@")[0];
    byEmail.set(email, {
      key: row.id || email,
      name,
      email: row.email || email,
      dept: "—",
      avatar: "🧑‍💻",
      status: "online",
    });
  });

  allAdminEmails().forEach((adminEm) => {
    const em = String(adminEm || "").toLowerCase().trim();
    if (!em || em === me || byEmail.has(em)) return;
    byEmail.set(em, {
      key: `admin-${em}`,
      name: em.split("@")[0],
      email: em,
      dept: "—",
      avatar: "🧑‍💻",
      status: "online",
    });
  });

  getEmployeeRoster().forEach((r) => {
    const em = String(r.email || "").toLowerCase().trim();
    if (!em || em === me) return;
    const name = String(r.name || "").trim() || em.split("@")[0];
    const prev = byEmail.get(em);
    if (prev) {
      byEmail.set(em, { ...prev, name: name || prev.name, key: r.uid || prev.key });
    } else {
      byEmail.set(em, {
        key: r.uid || em,
        name,
        email: r.email,
        dept: "—",
        avatar: "🧑‍💻",
        status: "online",
      });
    }
  });

  return [...byEmail.values()].sort((a, b) => String(a.name).localeCompare(String(b.name), "ko"));
}

function detectInAppMessengerBrowser() {
  const ua = navigator.userAgent || "";
  return /KAKAOTALK|Line\/|Instagram|FBAN|FBAV|NAVER|DaumApps/i.test(ua);
}

function tryOpenInExternalBrowser() {
  const href = window.location.href.split("#")[0];
  try {
    if (/Android/i.test(navigator.userAgent)) {
      const u = new URL(href);
      const pathPart = `${u.host}${u.pathname}${u.search}`;
      window.location.href = `intent://${pathPart}#Intent;scheme=https;package=com.android.chrome;end`;
      return;
    }
  } catch (_) {}
  window.open(href, "_blank", "noopener,noreferrer");
}

const LOGIN_LOGO_CANDIDATES = ["트리맨더스로고.png", "트리맨더스로고.webp", "트리맨더스로고.jpg", "트리맨더스로고.svg"];

// ============================================================
// Component: Login Screen
// ============================================================
function LoginScreen({ onGoRegister, onGoFindAccount, gateMessage }) {
  const initialRemember = typeof location !== "undefined" ? loadRememberedLoginId() : { id: "", valid: false };
  const [email, setEmail] = useState(initialRemember.id);
  const [password, setPassword] = useState("");
  const [rememberId, setRememberId] = useState(initialRemember.valid);
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [bootMsg, setBootMsg] = useState("");
  const [loginLogoIx, setLoginLogoIx] = useState(0);
  const showBootstrap = typeof location !== "undefined" && new URLSearchParams(location.search).get("tm_bootstrap") === "1";

  useEffect(() => {
    if (gateMessage) setError("");
  }, [gateMessage]);

  const handleLogin = () => {
    if (!email || !password) { setError("이메일과 비밀번호를 입력해주세요."); return; }
    setError("");
    setBusy(true);
    const loginEmail = normalizeLoginEmailInput(email);
    firebase.auth().signInWithEmailAndPassword(loginEmail, password)
      .then(() => {
        if (rememberId) saveRememberedLoginId(email.trim() || loginEmail);
        else clearRememberedLoginId();
      })
      .catch((e) => {
        let m = authErrorMessageKo(e.code);
        if (loginEmail.toLowerCase() === ADMIN_CANONICAL_EMAIL.toLowerCase() && (e.code === "auth/invalid-credential" || e.code === "auth/user-not-found" || e.code === "auth/wrong-password")) {
          m += " Firebase에 이 관리자 계정이 없거나 비밀번호가 다릅니다. 주소에 ?tm_bootstrap=1 을 붙여 한 번만 계정을 만들거나, 콘솔에서 사용자를 추가하세요.";
        }
        setError(m);
      })
      .finally(() => setBusy(false));
  };

  const ensureAdminAccount = async () => {
    setBootMsg("");
    setBusy(true);
    try {
      await firebase.auth().createUserWithEmailAndPassword(ADMIN_CANONICAL_EMAIL, "123456");
      await firebase.auth().signOut();
      setBootMsg("관리자 계정을 만들었습니다. 주소에서 ?tm_bootstrap=1 을 지우고, 아이디 " + ADMIN_LOCAL_LOGIN_ID + " / 비밀번호 123456 으로 로그인하세요.");
    } catch (e) {
      if (e.code === "auth/email-already-in-use") {
        setBootMsg("이미 같은 이메일이 등록되어 있습니다. 비밀번호가 123456 인지 확인하거나, Firebase 콘솔에서 비밀번호를 재설정하세요.");
      } else {
        setBootMsg(authErrorMessageKo(e.code));
      }
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={styles.loginContainer}>
      <div style={{ width: "100%", maxWidth: "min(100%, 400px)", marginBottom: 12 }}>
        <InAppBrowserHint />
      </div>
      <div style={{ textAlign: "center", marginBottom: 32, animation: "fadeIn 0.6s ease" }}>
        {loginLogoIx < LOGIN_LOGO_CANDIDATES.length ? (
          <img src={LOGIN_LOGO_CANDIDATES[loginLogoIx]} alt="트리맨더스" style={styles.loginLogo} onError={() => setLoginLogoIx((i) => i + 1)} />
        ) : (
          <div style={styles.loginLogoFallback}>💬</div>
        )}
        <div style={styles.loginTitle}>트리맨더스</div>
        <div style={styles.loginSubtitle}>우리 회사 전용 메신저</div>
      </div>
      <div style={{ width: "100%", maxWidth: "min(100%, 360px)", animation: "slideUp 0.5s ease" }}>
        {showBootstrap && (
          <div style={{ ...styles.card, marginBottom: 16, borderColor: COLORS.warning + "66", background: `${COLORS.warning}10` }}>
            <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>최초 설정 (로컬에서 한 번만)</div>
            <div style={{ fontSize: 12, color: COLORS.textMuted, lineHeight: 1.5, marginBottom: 12 }}>
              Firebase에 <code style={{ color: COLORS.primary }}>{ADMIN_CANONICAL_EMAIL}</code> 계정이 없을 때만 누르세요. 만든 뒤에는 이 주소에서 <code>?tm_bootstrap=1</code> 을 제거하세요.
            </div>
            <button type="button" style={{ ...styles.primaryBtn, marginTop: 0 }} onClick={ensureAdminAccount} disabled={busy}>{busy ? "처리 중…" : "관리자 계정 만들기 (비밀번호 123456)"}</button>
            {bootMsg && <div style={{ marginTop: 12, fontSize: 12, color: bootMsg.includes("만들었") ? COLORS.success : COLORS.warning, lineHeight: 1.5 }}>{bootMsg}</div>}
          </div>
        )}
        <input style={styles.input} placeholder="이메일 또는 관리자 아이디" value={email} onChange={e => setEmail(e.target.value)} onFocus={e => e.target.style.borderColor = COLORS.primary} onBlur={e => e.target.style.borderColor = COLORS.border} disabled={busy} autoComplete="username" />
        <input style={styles.input} type="password" placeholder="비밀번호" value={password} onChange={e => setPassword(e.target.value)} onFocus={e => e.target.style.borderColor = COLORS.primary} onBlur={e => e.target.style.borderColor = COLORS.border} disabled={busy} onKeyDown={e => e.key === "Enter" && handleLogin()} autoComplete="current-password" />
        <label
          style={{
            display: "flex",
            alignItems: "center",
            gap: 10,
            marginBottom: 12,
            cursor: busy ? "default" : "pointer",
            userSelect: "none",
            fontSize: 13,
            color: COLORS.textMuted,
          }}
        >
          <input
            type="checkbox"
            checked={rememberId}
            onChange={(e) => setRememberId(e.target.checked)}
            disabled={busy}
            style={{ width: 18, height: 18, accentColor: COLORS.primary, cursor: busy ? "default" : "pointer" }}
          />
          <span>아이디 저장</span>
        </label>
        {gateMessage ? (
          <div style={{ color: COLORS.warning, fontSize: 13, marginBottom: 8, textAlign: "center", lineHeight: 1.5, padding: "10px 12px", background: `${COLORS.warning}14`, borderRadius: 10 }}>
            {gateMessage}
          </div>
        ) : null}
        {error && <div style={{ color: COLORS.danger, fontSize: 13, marginBottom: 8, textAlign: "center" }}>{error}</div>}
        <button style={{ ...styles.primaryBtn, opacity: busy ? 0.7 : 1, cursor: busy ? "wait" : "pointer" }} onClick={handleLogin} disabled={busy} onMouseOver={e => !busy && (e.target.style.transform = "translateY(-1px)")} onMouseOut={e => (e.target.style.transform = "none")}>{busy ? "로그인 중…" : "로그인"}</button>
        <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 16 }}>
          <button style={styles.linkBtn} onClick={onGoRegister}>이메일로 회원가입</button>
          <span style={{ color: COLORS.border, lineHeight: "36px" }}>|</span>
          <button style={styles.linkBtn} onClick={onGoFindAccount}>계정 찾기</button>
        </div>
      </div>
    </div>
  );
}

function RegisterScreen({ onBack }) {
  const [form, setForm] = useState({ name: "", email: "", password: "", passwordConfirm: "" });
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [sent, setSent] = useState(false);

  const handleRegister = async () => {
    if (!form.name || !form.email || !form.password) { setError("필수 항목을 입력해주세요."); return; }
    if (!String(form.passwordConfirm || "").trim()) { setError("비밀번호 확인란을 입력해주세요."); return; }
    if (form.password !== form.passwordConfirm) { setError("비밀번호와 비밀번호 확인이 일치하지 않습니다."); return; }
    const pwChk = validatePasswordStrength(form.password);
    if (!pwChk.ok) { setError(pwChk.message); return; }
    const regEmail = normalizeLoginEmailInput(form.email);
    if (regEmail.toLowerCase() === ADMIN_CANONICAL_EMAIL.toLowerCase()) {
      setError("이 주소는 시스템 관리자 전용입니다. 직원은 다른 이메일로 가입해주세요.");
      return;
    }
    setError("");
    setBusy(true);
    let cred = null;
    try {
      cred = await firebase.auth().createUserWithEmailAndPassword(regEmail, form.password);
      await cred.user.updateProfile({ displayName: form.name.trim() });
      await firebase.firestore().collection("employeeApprovals").doc(cred.user.uid).set({
        email: regEmail.toLowerCase().trim(),
        displayName: form.name.trim(),
        status: "pending",
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      await passwordMetaRef(cred.user.uid).set(
        { passwordUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() },
        { merge: true }
      );
    } catch (e) {
      if (cred && cred.user) {
        try {
          await cred.user.delete();
        } catch (_) {}
      }
      setError(e.code ? authErrorMessageKo(e.code) : String(e.message || e));
      setBusy(false);
      return;
    }
    try {
      applyAuthLanguageKo();
      const actionUrl = getEmailVerificationContinueUrl();
      await cred.user.sendEmailVerification({
        url: actionUrl,
        handleCodeInApp: false,
      });
      await firebase.auth().signOut();
      setSent(true);
    } catch (e) {
      console.error("[sendEmailVerification]", e.code, getEmailVerificationContinueUrl());
      setError(authErrorMessageKo(e.code) || String(e.message || e));
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={styles.loginContainer}>
      <div style={{ width: "100%", maxWidth: 320 }}>
        <button style={{ ...styles.linkBtn, padding: "0 0 20px", color: COLORS.text }} onClick={onBack} disabled={busy}>← 돌아가기</button>
        <div style={{ fontSize: 24, fontWeight: 800, marginBottom: 4 }}>이메일로 회원가입</div>
        <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 28, lineHeight: 1.55 }}>
          가입 후 <strong style={{ color: COLORS.text }}>이메일 인증</strong>과 <strong style={{ color: COLORS.text }}>관리자 승인</strong>이 필요합니다. 관리자 패널 「배포 주소」에 적은 URL과 동일한 주소가 인증 메일의 이동 링크에 사용됩니다.
          <br />
          <span style={{ color: COLORS.warning }}>비밀번호</span>: {PASSWORD_MIN_LENGTH}자 이상, <strong>대문자·소문자·숫자·특수문자</strong>를 각각 포함해야 합니다. (약 3개월마다 변경 안내)
        </div>
        {sent ? (
          <div style={{ padding: 20, background: `${COLORS.success}18`, borderRadius: 16, color: COLORS.success, fontSize: 14, lineHeight: 1.6, marginBottom: 16 }}>
            <strong>인증 메일을 보냈습니다.</strong><br />
            메일의 링크를 누르면 <strong>로그인 화면</strong>으로 이동합니다. 인증을 마친 뒤 관리자가 가입을 승인하면 로그인할 수 있습니다.
            <br /><br />
            <span style={{ fontSize: 12, opacity: 0.95 }}>
              안 오면 <strong>스팸·프로모션함</strong>을 확인하고, 5~10분 뒤에도 없으면 아래에서 「로그인」 후 인증 화면의 <strong>인증 메일 다시 보내기</strong>를 눌러 주세요. 네이버·다음 등은 noreply 메일이 늦거나 걸러질 수 있습니다.
            </span>
          </div>
        ) : null}
        {!sent && (
          <>
            <input style={styles.input} placeholder="이름 *" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} disabled={busy} />
            <input style={styles.input} placeholder="이메일 *" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} disabled={busy} />
            <input style={styles.input} type="password" placeholder={`비밀번호 * (${PASSWORD_MIN_LENGTH}자+, 대소문자·숫자·특수문자)`} value={form.password} onChange={e => { setError(""); setForm({ ...form, password: e.target.value }); }} disabled={busy} />
            <input style={styles.input} type="password" placeholder="비밀번호 확인 * (동일하게 다시 입력)" value={form.passwordConfirm} onChange={e => { setError(""); setForm({ ...form, passwordConfirm: e.target.value }); }} disabled={busy} />
            {form.passwordConfirm.length > 0 ? (
              <div
                style={{
                  fontSize: 12,
                  marginTop: -4,
                  marginBottom: 8,
                  textAlign: "left",
                  color: form.password === form.passwordConfirm ? COLORS.success : COLORS.danger,
                  fontWeight: 600,
                }}
              >
                {form.password === form.passwordConfirm ? "✓ 비밀번호가 일치합니다." : "✕ 비밀번호가 일치하지 않습니다."}
              </div>
            ) : null}
            {error && <div style={{ color: COLORS.danger, fontSize: 13, marginBottom: 8, textAlign: "center" }}>{error}</div>}
            <button
              style={{
                ...styles.primaryBtn,
                opacity: busy || form.password !== form.passwordConfirm || !String(form.passwordConfirm || "").trim() ? 0.7 : 1,
                cursor: busy ? "wait" : "pointer",
              }}
              onClick={handleRegister}
              disabled={busy || form.password !== form.passwordConfirm || !String(form.passwordConfirm || "").trim()}
            >
              {busy ? "처리 중…" : "이메일로 가입하기"}
            </button>
          </>
        )}
        {sent && <button style={{ ...styles.primaryBtn, marginTop: 12, background: COLORS.cardBg, color: COLORS.text, border: `1px solid ${COLORS.border}` }} onClick={() => { setSent(false); onBack(); }}>로그인으로</button>}
      </div>
    </div>
  );
}

function FindAccountScreen({ onBack }) {
  const [tab, setTab] = useState("id");
  const [email, setEmail] = useState("");
  const [result, setResult] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const handleCheckEmail = async () => {
    setError("");
    setResult("");
    if (!email.trim()) { setError("이메일을 입력해주세요."); return; }
    setBusy(true);
    try {
      const methods = await firebase.auth().fetchSignInMethodsForEmail(email.trim());
      if (methods && methods.length > 0) {
        setResult("이 이메일은 가입되어 있습니다. 아이디(이메일)는 위에 입력한 주소와 동일합니다. 비밀번호를 잊었다면 「비밀번호 찾기」 탭을 이용하세요.");
      } else {
        setResult("이 이메일로는 가입 기록이 없습니다. 이메일 철자를 확인하거나 회원가입을 진행해주세요.");
      }
    } catch (e) {
      setError(authErrorMessageKo(e.code));
    } finally {
      setBusy(false);
    }
  };

  const handleResetPw = async () => {
    setError("");
    setResult("");
    if (!email.trim()) { setError("이메일을 입력해주세요."); return; }
    setBusy(true);
    try {
      await firebase.auth().sendPasswordResetEmail(email.trim());
      setResult("비밀번호 재설정 링크를 이메일로 보냈습니다. 받은편지함(스팸함)을 확인해주세요.");
    } catch (e) {
      setError(authErrorMessageKo(e.code));
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={styles.loginContainer}>
      <div style={{ width: "100%", maxWidth: 320 }}>
        <button style={{ ...styles.linkBtn, padding: "0 0 20px", color: COLORS.text }} onClick={onBack}>← 돌아가기</button>
        <div style={{ fontSize: 24, fontWeight: 800, marginBottom: 24 }}>계정 찾기</div>
        <div style={{ display: "flex", gap: 0, marginBottom: 24 }}>
          {["id", "pw"].map(t => (
            <button key={t} onClick={() => { setTab(t); setResult(""); setError(""); }} style={{
              flex: 1, padding: "12px", border: "none", fontFamily: FONT, fontSize: 14, fontWeight: 600, cursor: "pointer",
              background: tab === t ? COLORS.primary : COLORS.cardBg,
              color: tab === t ? COLORS.dark : COLORS.textMuted,
              borderRadius: t === "id" ? "12px 0 0 12px" : "0 12px 12px 0",
            }}>
              {t === "id" ? "아이디(이메일) 확인" : "비밀번호 찾기"}
            </button>
          ))}
        </div>
        <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 12, lineHeight: 1.5 }}>
          {tab === "id" ? "기억나는 이메일을 입력하면 가입 여부를 확인할 수 있습니다." : "가입 시 사용한 이메일로 재설정 링크를 보냅니다."}
        </div>
        <input style={styles.input} placeholder="이메일" value={email} onChange={e => setEmail(e.target.value)} disabled={busy} />
        {error && <div style={{ color: COLORS.danger, fontSize: 13, marginBottom: 8, textAlign: "center" }}>{error}</div>}
        <button style={{ ...styles.primaryBtn, opacity: busy ? 0.7 : 1 }} onClick={tab === "id" ? handleCheckEmail : handleResetPw} disabled={busy}>{busy ? "처리 중…" : (tab === "id" ? "가입 여부 확인" : "재설정 메일 보내기")}</button>
        {result && (
          <div style={{ marginTop: 16, padding: 16, background: result.includes("없습니다") ? `${COLORS.warning}18` : `${COLORS.success}15`, borderRadius: 12, color: result.includes("없습니다") ? COLORS.warning : COLORS.success, fontSize: 14, textAlign: "center", lineHeight: 1.5 }}>
            {result}
          </div>
        )}
      </div>
    </div>
  );
}

function VerifyEmailScreen() {
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);
  const user = firebase.auth().currentUser;

  const resend = async () => {
    if (!user) return;
    setBusy(true);
    setMsg("");
    try {
      applyAuthLanguageKo();
      await user.sendEmailVerification({
        url: getEmailVerificationContinueUrl(),
        handleCodeInApp: false,
      });
      setMsg("인증 메일을 다시 보냈습니다. 링크를 누르면 로그인 화면으로 돌아갑니다. 스팸함도 확인해 주세요.");
    } catch (e) {
      console.error("[sendEmailVerification resend]", e.code, getEmailVerificationContinueUrl());
      setMsg(authErrorMessageKo(e.code));
    } finally {
      setBusy(false);
    }
  };

  const recheck = async () => {
    if (!user) return;
    setBusy(true);
    setMsg("");
    try {
      await user.reload();
      if (firebase.auth().currentUser.emailVerified) {
        window.location.reload();
        return;
      }
      setMsg("아직 인증되지 않았습니다. 메일의 링크를 눌렀는지 확인해주세요.");
    } catch (e) {
      setMsg(authErrorMessageKo(e.code));
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={styles.loginContainer}>
      <div style={{ width: "100%", maxWidth: 340, textAlign: "center" }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>✉️</div>

        <div style={{ fontSize: 12, color: COLORS.textMuted, lineHeight: 1.55, marginBottom: 24 }}>

        </div>

// Component: 회원 탈퇴 (직원·비관리자만)
// ============================================================
function WithdrawAccountModal({ onClose, currentUser }) {
  const [password, setPassword] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  const runWithdraw = async () => {
    setError("");
    if (!password.trim()) {
      setError("비밀번호를 입력해주세요.");
      return;
    }
    const user = firebase.auth().currentUser;
    if (!user || !user.email) {
      setError("로그인 정보를 찾을 수 없습니다.");
      return;
    }
    if (!window.confirm("정말 탈퇴할까요? 계정과 연결된 데이터가 삭제되며 복구할 수 없습니다.")) return;
    setBusy(true);
    try {
      const cred = firebase.auth.EmailAuthProvider.credential(user.email, password);
      await user.reauthenticateWithCredential(cred);
      const uid = user.uid;
      const em = user.email;
      await deleteEmployeeFirestorePresence(uid, em);
      removeEmployeeRosterEntry(em, uid);
      clearLocalTreemandersDataForWithdraw(em);
      await user.delete();
      onClose();
    } catch (e) {
      setError(authErrorMessageKo(e.code) || String(e.message || e));
    } finally {
      setBusy(false);
    }
  };

  return (
    <div
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(0,0,0,0.6)",
        zIndex: 9999,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        padding: 20,
        fontFamily: FONT,
      }}
      onClick={busy ? undefined : onClose}
    >
      <div
        style={{ ...styles.card, maxWidth: 420, width: "100%", border: `1px solid ${COLORS.border}` }}
        onClick={(e) => e.stopPropagation()}
      >
        <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 8 }}>회원 탈퇴</div>
        <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.6, marginBottom: 16 }}>
          Firebase 계정이 삭제되고, 가입 승인 기록·내 휴무 신청·고정휴무 설정이 함께 지워집니다. 이 기기에 저장된 채팅(로컬)도 비웁니다.
        </div>
        <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 8 }}>{currentUser?.email}</div>
        <input
          style={{ ...styles.input, marginBottom: 12 }}
          type="password"
          placeholder="현재 비밀번호"
          value={password}
          onChange={(e) => setPassword(e.target.value)}
          disabled={busy}
          autoComplete="current-password"
        />
        {error ? <div style={{ color: COLORS.danger, fontSize: 13, marginBottom: 12 }}>{error}</div> : null}
        <div style={{ display: "flex", gap: 10 }}>
          <button
            type="button"
            style={{ flex: 1, padding: 12, borderRadius: 10, border: `1px solid ${COLORS.border}`, background: COLORS.cardBg, color: COLORS.text, fontWeight: 700, cursor: busy ? "wait" : "pointer", fontFamily: FONT }}
            onClick={onClose}
            disabled={busy}
          >
            취소
          </button>
          <button
            type="button"
            style={{ flex: 1, padding: 12, borderRadius: 10, border: "none", background: COLORS.danger, color: "#fff", fontWeight: 700, cursor: busy ? "wait" : "pointer", fontFamily: FONT }}
            onClick={runWithdraw}
            disabled={busy}
          >
            {busy ? "처리 중…" : "탈퇴하기"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// Component: 비밀번호 변경 (정기 강제 / 더보기에서 선택)
// ============================================================
function PasswordChangeScreen({ forced, onSuccess, onCancel }) {
  const user = firebase.auth().currentUser;
  const [currentPw, setCurrentPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [newPw2, setNewPw2] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setError("");
    if (!user || !user.email) {
      setError("로그인 정보가 없습니다.");
      return;
    }
    if (!currentPw.trim()) {
      setError("현재 비밀번호를 입력해 주세요.");
      return;
    }
    const v = validatePasswordStrength(newPw);
    if (!v.ok) {
      setError(v.message);
      return;
    }
    if (newPw !== newPw2) {
      setError("새 비밀번호가 서로 일치하지 않습니다.");
      return;
    }
    if (newPw === currentPw) {
      setError("새 비밀번호는 현재 비밀번호와 달라야 합니다.");
      return;
    }
    setBusy(true);
    try {
      const cred = firebase.auth.EmailAuthProvider.credential(user.email, currentPw);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(newPw);
      await touchPasswordUpdatedAt(user.uid);
      onSuccess();
    } catch (e) {
      setError(authErrorMessageKo(e.code) || String(e.message || e));
    } finally {
      setBusy(false);
    }
  };

  if (!user) {
    return (
      <div style={{ ...styles.loginContainer, fontFamily: FONT }}>
        <div style={{ color: COLORS.textMuted }}>로그인이 필요합니다.</div>
      </div>
    );
  }

  return (
    <div style={{ ...styles.loginContainer, fontFamily: FONT }}>
      <div style={{ width: "100%", maxWidth: 380 }}>
        <div style={{ textAlign: "center", marginBottom: 22 }}>
          <div style={{ color: COLORS.primary, marginBottom: 8, display: "flex", justifyContent: "center" }}>
            <Icons.Lock />
          </div>
          <div style={{ fontSize: 22, fontWeight: 800 }}>{forced ? "비밀번호 변경 필요" : "비밀번호 변경"}</div>
          {forced ? (
            <div style={{ fontSize: 13, color: COLORS.warning, marginTop: 12, lineHeight: 1.55 }}>
              보안 정책으로 <strong>약 3개월</strong>마다 비밀번호를 바꿔 주세요. 지금 기한이 지나 앱을 쓰려면 새 비밀번호로 변경해야 합니다.
              <br />
              <span style={{ color: COLORS.textMuted }}>규칙: {PASSWORD_MIN_LENGTH}자 이상, 영문 대·소문자, 숫자, 특수문자 각 1개 이상</span>
            </div>
          ) : (
            <div style={{ fontSize: 13, color: COLORS.textMuted, marginTop: 12, lineHeight: 1.55 }}>
              {PASSWORD_MIN_LENGTH}자 이상, 영문 대·소문자, 숫자, 특수문자를 각각 포함해 주세요. 변경 후 다음 주기 안내 시각이 갱신됩니다.
            </div>
          )}
        </div>
        <input
          style={styles.input}
          type="password"
          placeholder="현재 비밀번호"
          value={currentPw}
          onChange={(e) => setCurrentPw(e.target.value)}
          disabled={busy}
          autoComplete="current-password"
        />
        <input
          style={styles.input}
          type="password"
          placeholder={`새 비밀번호 (${PASSWORD_MIN_LENGTH}자+, 대소문자·숫자·특수문자)`}
          value={newPw}
          onChange={(e) => setNewPw(e.target.value)}
          disabled={busy}
          autoComplete="new-password"
        />
        <input
          style={styles.input}
          type="password"
          placeholder="새 비밀번호 확인"
          value={newPw2}
          onChange={(e) => setNewPw2(e.target.value)}
          disabled={busy}
          autoComplete="new-password"
        />
        {error ? <div style={{ color: COLORS.danger, fontSize: 13, marginBottom: 10, textAlign: "center" }}>{error}</div> : null}
        <button type="button" style={{ ...styles.primaryBtn, opacity: busy ? 0.7 : 1, cursor: busy ? "wait" : "pointer" }} onClick={submit} disabled={busy}>
          {busy ? "처리 중…" : "비밀번호 변경"}
        </button>
        <button
          type="button"
          style={{
            ...styles.primaryBtn,
            marginTop: 10,
            background: COLORS.cardBg,
            color: COLORS.text,
            border: `1px solid ${COLORS.border}`,
          }}
          onClick={onCancel}
          disabled={busy}
        >
          {forced ? "로그아웃하고 나중에" : "취소"}
        </button>
      </div>
    </div>
  );
}

// ============================================================
// Component: Chat Room
// ============================================================
function ChatRoom({ room, onBack, currentUser, onDmSent, dmOwnerEmail, persistOwnerEmail, canClearChat }) {
  const isDm = room.type === "dm";
  const [messages, setMessages] = useState(() => {
    if (isDm && dmOwnerEmail) return getDmMessages(dmOwnerEmail, room.id);
    if (!isDm && persistOwnerEmail) {
      const saved = getGroupRoomMessages(persistOwnerEmail, room.id);
      return saved.length ? saved : defaultGroupRoomSeedMessages();
    }
    return defaultGroupRoomSeedMessages();
  });
  const [input, setInput] = useState("");
  const messagesEndRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  useEffect(() => {
    if (!isDm || !dmOwnerEmail) return undefined;
    const sync = () => setMessages(getDmMessages(dmOwnerEmail, room.id));
    sync();
    const h = (e) => {
      if (e.detail && e.detail.roomId === room.id) sync();
    };
    window.addEventListener("treemanders-dm-messages-updated", h);
    return () => window.removeEventListener("treemanders-dm-messages-updated", h);
  }, [isDm, room.id, dmOwnerEmail]);

  useEffect(() => {
    if (isDm || !persistOwnerEmail) return undefined;
    const sync = () => {
      const saved = getGroupRoomMessages(persistOwnerEmail, room.id);
      setMessages(saved.length ? saved : defaultGroupRoomSeedMessages());
    };
    sync();
    const h = (e) => {
      if (e.detail && e.detail.roomId === room.id) sync();
    };
    window.addEventListener("treemanders-group-messages-updated", h);
    return () => window.removeEventListener("treemanders-group-messages-updated", h);
  }, [isDm, room.id, persistOwnerEmail]);

  const sendMessage = () => {
    const t = new Date().toLocaleTimeString("ko", { hour: "2-digit", minute: "2-digit" });
    const text = input.trim();
    if (!text) return;
    if (isDm && dmOwnerEmail) {
      const myName = currentUser?.name || "나";
      const msg = { id: Date.now(), sender: myName, text, time: t, mine: true };
      appendDmMessage(dmOwnerEmail, room.id, msg);
      if (typeof onDmSent === "function") onDmSent(room, text);
    } else if (!isDm && persistOwnerEmail) {
      const myName = currentUser?.name || "나";
      const msg = { id: Date.now(), sender: myName, text, time: t, mine: true };
      appendGroupRoomMessage(persistOwnerEmail, room.id, msg);
    } else {
      setMessages((prev) => [...prev, { id: Date.now(), sender: "나", text, time: t, mine: true }]);
    }
    setInput("");
  };

  const doClearHistory = () => {
    if (!canClearChat) return;
    if (!window.confirm("이 채팅방의 기록을 이 기기에서 삭제할까요?")) return;
    if (isDm && dmOwnerEmail) {
      clearDmMessagesForRoom(dmOwnerEmail, room.id);
      setMessages([]);
    } else if (!isDm && persistOwnerEmail) {
      clearGroupRoomMessages(persistOwnerEmail, room.id);
      setMessages(defaultGroupRoomSeedMessages());
    }
  };

  return (
    <div style={styles.chatRoom}>
      <div style={{ ...styles.header, display: "flex", alignItems: "center", gap: 8 }}>
        <button onClick={onBack} style={{ background: "none", border: "none", color: COLORS.text, cursor: "pointer", padding: 4, flexShrink: 0 }}><Icons.Back /></button>
        <span style={{ fontWeight: 700, fontSize: 16, flex: 1, minWidth: 0, textAlign: "center", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{room.name}</span>
        {canClearChat ? (
          <button
            type="button"
            onClick={doClearHistory}
            style={{
              flexShrink: 0,
              fontSize: 11,
              padding: "6px 8px",
              background: `${COLORS.danger}22`,
              color: COLORS.danger,
              border: "none",
              borderRadius: 8,
              cursor: "pointer",
              fontFamily: FONT,
              fontWeight: 600,
            }}
          >
            기록 삭제
          </button>
        ) : (
          <div style={{ width: 30, flexShrink: 0 }} />
        )}
      </div>
      <div style={styles.messagesArea}>
        {messages.map((m) => (
          <div key={m.id} style={{ display: "flex", flexDirection: "column", alignItems: m.mine ? "flex-end" : "flex-start", gap: 4 }}>
            {!m.mine && <span style={{ fontSize: 13, color: COLORS.textMuted, marginLeft: 4 }}>{isDm ? room.peerName || m.sender : m.sender}</span>}
            <div style={m.mine ? styles.bubbleMine : styles.bubbleOther}>{m.text}</div>
            <span style={{ fontSize: 12, color: COLORS.textMuted, margin: "0 4px" }}>{m.time}</span>
          </div>
        ))}
        <div ref={messagesEndRef} />
      </div>
      <div style={styles.chatInput}>
        <input
          style={{ ...styles.input, marginBottom: 0, flex: 1, borderRadius: 24 }}
          placeholder="메시지를 입력하세요..."
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={(e) => {
            if (e.key !== "Enter" || e.shiftKey) return;
            if (e.nativeEvent.isComposing) return;
            e.preventDefault();
            sendMessage();
          }}
        />
        <button onClick={sendMessage} style={{ width: 44, height: 44, borderRadius: "50%", background: COLORS.primary, border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: COLORS.dark, flexShrink: 0 }}>
          <Icons.Send />
        </button>
      </div>
    </div>
  );
}

// ============================================================
// Component: Notice Board (읽기 / 관리자: 작성·수정·삭제)
// ============================================================
function NoticeBoard({ adminMode, authorDefault }) {
  const [list, setList] = useState(() => getNoticesList());
  const [selected, setSelected] = useState(null);
  const [editor, setEditor] = useState(null);

  useEffect(() => {
    const h = () => setList(getNoticesList());
    window.addEventListener("treemanders-notices-updated", h);
    return () => window.removeEventListener("treemanders-notices-updated", h);
  }, []);

  const sorted = useMemo(() => {
    return [...list].sort((a, b) => {
      if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
      return String(b.date).localeCompare(String(a.date));
    });
  }, [list]);

  useEffect(() => {
    if (selected == null) return;
    if (!sorted.some((x) => x.id === selected)) setSelected(null);
  }, [selected, sorted]);

  const todayStr = () => {
    const t = new Date();
    return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, "0")}-${String(t.getDate()).padStart(2, "0")}`;
  };

  const nextNoticeId = (arr) => Math.max(0, ...arr.map((x) => (Number.isFinite(Number(x.id)) ? Number(x.id) : 0))) + 1;

  const openNew = () => {
    setEditor({
      mode: "new",
      draft: { title: "", content: "", date: todayStr(), author: authorDefault || "관리자", pinned: false },
    });
  };

  const openEdit = (n) => {
    setSelected(null);
    setEditor({ mode: "edit", draft: { ...n } });
  };

  const closeEditor = () => setEditor(null);

  const saveDraft = () => {
    if (!editor) return;
    const d = editor.draft;
    if (!String(d.title || "").trim()) {
      window.alert("제목을 입력해 주세요.");
      return;
    }
    let next = [...list];
    const author = String(d.author || authorDefault || "관리자").trim() || "관리자";
    if (editor.mode === "new") {
      next.push(normalizeNotice({ ...d, id: nextNoticeId(next), author }));
    } else {
      next = next.map((x) => (x.id === d.id ? normalizeNotice({ ...d, author }) : x));
    }
    saveNoticesList(next);
    setList(next);
    closeEditor();
  };

  const removeNotice = (id) => {
    if (!window.confirm("이 공지를 삭제할까요?")) return;
    const next = list.filter((x) => x.id !== id);
    saveNoticesList(next);
    setList(next);
    setSelected(null);
  };

  if (adminMode && editor) {
    const d = editor.draft;
    return (
      <div style={{ padding: 20 }}>
        <div style={{ ...styles.card, borderColor: COLORS.primary + "44" }}>
          <div style={{ fontWeight: 700, marginBottom: 16 }}>{editor.mode === "new" ? "새 공지 작성" : "공지 수정"}</div>
          <input style={styles.input} placeholder="제목" value={d.title} onChange={(e) => setEditor({ ...editor, draft: { ...d, title: e.target.value } })} />
          <input style={styles.input} type="date" value={d.date} onChange={(e) => setEditor({ ...editor, draft: { ...d, date: e.target.value } })} />
          <input style={styles.input} placeholder="작성자 표시" value={d.author} onChange={(e) => setEditor({ ...editor, draft: { ...d, author: e.target.value } })} />
          <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, fontSize: 13, color: COLORS.text, cursor: "pointer" }}>
            <input type="checkbox" checked={!!d.pinned} onChange={(e) => setEditor({ ...editor, draft: { ...d, pinned: e.target.checked } })} style={{ width: 16, height: 16, accentColor: COLORS.primary }} />
            상단 고정
          </label>
          <textarea style={{ ...styles.input, minHeight: 160, resize: "vertical" }} placeholder="내용" value={d.content} onChange={(e) => setEditor({ ...editor, draft: { ...d, content: e.target.value } })} />
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <button type="button" style={{ ...styles.primaryBtn, flex: 1, marginTop: 0 }} onClick={saveDraft}>저장</button>
            <button type="button" style={{ flex: 1, padding: 14, background: COLORS.border, color: COLORS.text, border: "none", borderRadius: 12, fontWeight: 600, cursor: "pointer", fontFamily: FONT }} onClick={closeEditor}>취소</button>
          </div>
        </div>
      </div>
    );
  }

  if (selected != null) {
    const n = sorted.find((x) => x.id === selected);
    if (!n) return null;
    return (
      <div style={{ padding: 20 }}>
        <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", color: COLORS.text, cursor: "pointer", marginBottom: 16, fontFamily: FONT, fontSize: 14 }}>← 목록으로</button>
        <div style={styles.card}>
          {n.pinned && <div style={{ ...styles.badge(COLORS.danger), marginBottom: 12 }}>📌 고정</div>}
          <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>{n.title}</div>
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 16 }}>{n.author} · {n.date}</div>
          <div style={{ fontSize: 14, lineHeight: 1.7, color: COLORS.text, whiteSpace: "pre-wrap" }}>{n.content}</div>
        </div>
        {adminMode && (
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <button type="button" style={{ ...styles.primaryBtn, flex: 1, marginTop: 0 }} onClick={() => openEdit(n)}>수정</button>
            <button type="button" style={{ flex: 1, padding: 14, background: `${COLORS.danger}22`, color: COLORS.danger, border: "none", borderRadius: 12, fontWeight: 600, cursor: "pointer", fontFamily: FONT }} onClick={() => removeNotice(n.id)}>삭제</button>
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{ padding: 20 }}>
      {adminMode && (
        <div style={{ marginBottom: 16 }}>
          <button type="button" style={{ ...styles.primaryBtn, marginTop: 0 }} onClick={openNew}>+ 새 공지</button>
        </div>
      )}
      <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 16 }}>총 {sorted.length}건의 공지사항</div>
      {sorted.map((n) => (
        <div
          key={n.id}
          style={{ ...styles.card, cursor: "pointer" }}
          onClick={() => setSelected(n.id)}
          onMouseOver={(e) => (e.currentTarget.style.borderColor = COLORS.primary + "55")}
          onMouseOut={(e) => (e.currentTarget.style.borderColor = COLORS.border)}
        >
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
            {n.pinned && <span style={styles.badge(COLORS.danger)}>📌 고정</span>}
            <span style={{ fontSize: 15, fontWeight: 600 }}>{n.title}</span>
          </div>

      ))}

  );
}

function assignmentRecordToIso(a) {
  if (!a || !a.ym || a.day == null) return "";
  return `${a.ym}-${String(a.day).padStart(2, "0")}`;
}

function isoFromYmd(y, month, day) {
  return `${y}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
}

/** 해당 ISO 날짜가 속한 주(일요일 시작) 7일 ISO 배열 */
function weekIsoListSundayStart(iso) {
  const d = parseISODateLocal(iso);
  if (!d) return [];
  const dow = d.getDay();
  const sun = new Date(d.getFullYear(), d.getMonth(), d.getDate() - dow);
  const out = [];
  for (let i = 0; i < 7; i++) {
    out.push(fmtYMD(new Date(sun.getFullYear(), sun.getMonth(), sun.getDate() + i)));
  }
  return out;
}

function rosterEmailByPersonName(personName) {
  const p = String(personName || "").trim();
  const roster = getEmployeeRoster();
  const hit = roster.find((r) => String(r.name || "").trim() === p);
  return hit ? String(hit.email || "").toLowerCase().trim() : "";
}

function isPersonOffOnIso(personName, iso, leaveRequests) {
  const p = String(personName || "").trim();
  const personEm = rosterEmailByPersonName(p);
  for (const h of leaveRequests || []) {
    if (h.status !== "approved") continue;
    const u = String(h.user || "").trim();
    const he = String(h.userEmail || "").toLowerCase().trim();
    const nameMatch = u === p;
    const emailMatch = !!(personEm && he && he === personEm);
    if (!nameMatch && !emailMatch) continue;
    const dates = leaveRequestDatesList(h);
    if (dates.length) {
      if (dates.includes(iso)) return true;
    } else {
      const sd = h.startDate;
      const ed = h.endDate || h.startDate;
      if (sd && iso >= sd && iso <= ed) return true;
    }
  }
  return false;
}

function scheduleBoardRosterNames(employeeApprovalDocs) {
  const opts = getRegionAssignEmployeeSelectOptions(employeeApprovalDocs);
  return [...new Set(opts.map((o) => String(o.name || "").trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko"));
}

function assignsForPersonOnIso(allAssigns, iso, personName) {
  const p = String(personName || "").trim();
  return (allAssigns || []).filter((a) => assignmentRecordToIso(a) === iso && String(a.person || "").trim() === p);
}

/** 하루치 배정 배열 → 달력/목록용 직원별 { person, codes } (구역은 쉼표만, 공백 없음) */
function groupRegionAssignmentsByPerson(assignList) {
  const byPerson = new Map();
  for (const a of assignList || []) {
    const p = String(a.person || "").trim();
    if (!p) continue;
    if (!byPerson.has(p)) byPerson.set(p, []);
    if (a.region) byPerson.get(p).push(String(a.region).trim());
  }
  return [...byPerson.entries()]
    .map(([person, regs]) => {
      const uniq = [...new Set(regs)].sort((x, y) => x.localeCompare(y, "ko"));
      return { person, codes: uniq.join(",") };
    })
    .sort((a, b) => a.person.localeCompare(b.person, "ko"));
}

/** 구역 코드는 한 덩어리(311A 등)로 유지하고, 줄바꿈은 쉼표 사이에서만 일어나게 함 */
function CalendarAssignRowCodes({ codes, fontSize = 14 }) {
  const parts = String(codes || "")
    .split(",")
    .map((s) => s.trim())
    .filter(Boolean);
  if (parts.length === 0) return null;
  const mono = { fontFamily: "ui-monospace, monospace", color: COLORS.primary, fontWeight: 700, fontSize };
  return (
    <>
      {parts.map((code, i) => (
        <React.Fragment key={`${i}-${code}`}>
          {i > 0 ? <span style={mono}>,</span> : null}
          <span style={{ ...mono, whiteSpace: "nowrap" }}>{code}</span>
        </React.Fragment>
      ))}
    </>
  );
}

let _excelJsLoadPromise = null;
function ensureExcelJS() {
  if (typeof window.ExcelJS !== "undefined" && window.ExcelJS) return Promise.resolve(window.ExcelJS);
  if (_excelJsLoadPromise) return _excelJsLoadPromise;
  _excelJsLoadPromise = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js";
    s.async = true;
    s.onload = () => {
      if (typeof window.ExcelJS !== "undefined" && window.ExcelJS) resolve(window.ExcelJS);
      else reject(new Error("ExcelJS 전역 객체를 찾을 수 없습니다."));
    };
    s.onerror = () => reject(new Error("ExcelJS 스크립트를 불러오지 못했습니다."));
    document.head.appendChild(s);
  });
  return _excelJsLoadPromise;
}

/** 주간 엑셀 한 칸: 직원·해당일 기준 구역 또는 휴무 */
function excelCellValueForPersonDay(personName, iso, leaveRequests, regionAssignments) {
  const off = isPersonOffOnIso(personName, iso, leaveRequests);
  const alist = assignsForPersonOnIso(regionAssignments, iso, personName);
  const g = groupRegionAssignmentsByPerson(alist);
  const codes = g[0]?.codes || "";
  if (off) {
    return {
      richText: [
        { font: { name: "맑은 고딕", size: 11, bold: true, color: { argb: "FFFF0000" } }, text: "휴무" },
      ],
    };
  }
  if (codes) return codes;
  return "";
}

async function exportScheduleWeekExcel({ weekIsos, rosterNames, leaveRequests, regionAssignments }) {
  const em = firebase.auth().currentUser && firebase.auth().currentUser.email;
  if (!isAdminEmail(em)) throw new Error("관리자만 엑셀을 받을 수 있습니다.");
  const ExcelJS = await ensureExcelJS();
  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet("주간스케줄", { properties: { defaultRowHeight: 20 } });
  const wd = ["일", "월", "화", "수", "목", "금", "토"];
  const thick = { style: "medium", color: { argb: "FF000000" } };
  const borderAll = { top: thick, left: thick, bottom: thick, right: thick };

  const nameHeader = ws.getCell(1, 1);
  nameHeader.value = "이름";
  nameHeader.alignment = { horizontal: "center", vertical: "middle" };
  nameHeader.border = borderAll;
  nameHeader.fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FFF2F2F2" } };
  nameHeader.font = { name: "맑은 고딕", bold: true, size: 12, underline: true, color: { argb: "FF000000" } };

  for (let colIdx = 0; colIdx < 7; colIdx++) {
    const c = ws.getCell(1, colIdx + 2);
    c.value = wd[colIdx];
    c.alignment = { horizontal: "center", vertical: "middle" };
    c.border = borderAll;
    if (colIdx === 0) {
      c.fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FFE74C3C" } };
      c.font = { name: "맑은 고딕", bold: true, size: 12, underline: true, color: { argb: "FFFFFFFF" } };
    } else if (colIdx === 6) {
      c.fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FF2E75B6" } };
      c.font = { name: "맑은 고딕", bold: true, size: 12, underline: true, color: { argb: "FFFFFFFF" } };
    } else {
      c.fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FFFFFFFF" } };
      c.font = { name: "맑은 고딕", bold: true, size: 12, underline: true, color: { argb: "FF000000" } };
    }
  }

  const names = Array.isArray(rosterNames) ? rosterNames.filter((n) => String(n || "").trim()) : [];
  if (names.length === 0) {
    const c = ws.getCell(2, 1);
    c.value = "(등록된 직원 없음)";
    c.alignment = { horizontal: "left", vertical: "middle" };
    c.border = borderAll;
    c.font = { name: "맑은 고딕", size: 11, italic: true, color: { argb: "FF666666" } };
    for (let col = 2; col <= 8; col++) {
      const empty = ws.getCell(2, col);
      empty.value = "";
      empty.border = borderAll;
    }
  } else {
    names.forEach((name, rowIdx) => {
      const r = rowIdx + 2;
      const nameCell = ws.getCell(r, 1);
      nameCell.value = String(name).trim();
      nameCell.alignment = { horizontal: "left", vertical: "middle", wrapText: false };
      nameCell.border = borderAll;
      nameCell.font = { name: "맑은 고딕", size: 11, bold: true, color: { argb: "FF000000" } };
      weekIsos.forEach((iso, dayIdx) => {
        const cell = ws.getCell(r, dayIdx + 2);
        cell.value = excelCellValueForPersonDay(name, iso, leaveRequests, regionAssignments);
        cell.alignment = { horizontal: "center", vertical: "middle", wrapText: true };
        cell.border = borderAll;
        if (typeof cell.value === "string" && cell.value) {
          cell.font = { name: "맑은 고딕", size: 11, color: { argb: "FF000000" } };
        }
      });
    });
  }

  ws.getRow(1).height = 28;
  const lastRow = Math.max(2, names.length + 1);
  for (let rr = 2; rr <= lastRow; rr++) ws.getRow(rr).height = 22;

  ws.getColumn(1).width = 16;
  for (let i = 0; i < 7; i++) ws.getColumn(i + 2).width = 18;

  ws.views = [{ state: "frozen", xSplit: 1, ySplit: 1, topLeftCell: "B2", activeCell: "B2" }];

  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `스케줄_${weekIsos[0]}_${weekIsos[6]}.xlsx`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function ScheduleBoard({ leaveRequests = [], fixedOffByEmail = {}, allowExcelExport = false, employeeApprovalsList = [] }) {
  const [regionAssignTick, setRegionAssignTick] = useState(0);
  const [viewYm, setViewYm] = useState(() => {
    const t = new Date();
    return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, "0")}`;
  });
  const [selectedDayForWeek, setSelectedDayForWeek] = useState(null);
  const regionAssignments = useMemo(() => getRegionAssignments(), [regionAssignTick]);
  const savedRegions = useMemo(() => {
    void regionAssignTick;
    return getSavedRegions();
  }, [regionAssignTick]);

  const [employeeRosterTick, setEmployeeRosterTick] = useState(0);

  useEffect(() => {
    const bump = () => setRegionAssignTick((t) => t + 1);
    const onStorage = (e) => {
      if (e.key === LS_REGION_ASSIGN || e.key === LS_REGIONS) bump();
    };
    window.addEventListener("storage", onStorage);
    window.addEventListener("treemanders-region-assign-updated", bump);
    const poll = window.setInterval(bump, 2500);
    return () => {
      window.removeEventListener("storage", onStorage);
      window.removeEventListener("treemanders-region-assign-updated", bump);
      window.clearInterval(poll);
    };
  }, []);

  useEffect(() => {
    const bump = () => setEmployeeRosterTick((t) => t + 1);
    window.addEventListener("treemanders-employee-roster-updated", bump);
    const onStorage = (e) => {
      if (e.key === LS_EMPLOYEE_ROSTER) bump();
    };
    window.addEventListener("storage", onStorage);
    return () => {
      window.removeEventListener("treemanders-employee-roster-updated", bump);
      window.removeEventListener("storage", onStorage);
    };
  }, []);

  useEffect(() => {
    setSelectedDayForWeek(null);
  }, [viewYm]);

  const monthAssigns = useMemo(() => regionAssignments.filter((a) => a.ym === viewYm), [regionAssignments, viewYm]);
  const rosterNames = useMemo(() => scheduleBoardRosterNames(employeeApprovalsList), [regionAssignTick, employeeApprovalsList, employeeRosterTick]);

  const [y, m] = viewYm.split("-").map(Number);
  const dim = new Date(y, m, 0).getDate();
  const wd = ["일", "월", "화", "수", "목", "금", "토"];
  const first = new Date(y, m - 1, 1);
  const startWeekday = first.getDay();
  const calCellsSch = [];
  for (let i = 0; i < startWeekday; i++) calCellsSch.push(null);
  for (let d = 1; d <= dim; d++) calCellsSch.push(d);

  const findAssignSch = (day, region) => monthAssigns.find((a) => a.day === day && a.region === region);
  const dayAllFilledSch = (day) => {
    if (savedRegions.length === 0) return false;
    return savedRegions.every((r) => {
      const x = findAssignSch(day, r);
      return x && String(x.person || "").trim();
    });
  };

  const countWorkOffForDay = (day) => {
    const iso = isoFromYmd(y, m, day);
    let work = 0;
    let off = 0;
    for (const name of rosterNames) {
      const onLeave = isPersonOffOnIso(name, iso, leaveRequests);
      const hasAssign = assignsForPersonOnIso(regionAssignments, iso, name).length > 0;
      if (onLeave) off += 1;
      else if (hasAssign) work += 1;
    }
    return { work, off };
  };

  const selectedIso =
    selectedDayForWeek != null ? isoFromYmd(y, m, selectedDayForWeek) : null;
  const weekIsos = selectedIso ? weekIsoListSundayStart(selectedIso) : [];

  return (
    <div style={{ padding: "14px clamp(6px, 2vw, 12px) 28px" }}>
      <div style={{ fontSize: 14, color: COLORS.textMuted, marginBottom: 14, lineHeight: 1.5 }}>
        <strong style={{ color: COLORS.text }}>스케줄</strong> 달력에는 매일 <strong style={{ color: COLORS.text }}>근무·휴무 인원</strong>만 보입니다. 날짜를 누르면 그날이 속한 <strong style={{ color: COLORS.text }}>한 주(일~토)</strong>를 아래 표로 자세히 볼 수 있습니다. 휴무는 관리자가 <strong style={{ color: COLORS.text }}>승인</strong>된 건만 반영됩니다.
      </div>

      <div style={{ ...styles.card, marginBottom: 0, padding: "clamp(14px, 4vw, 22px)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12, marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={styles.badge(COLORS.success)}>실시간</span>
            <span style={{ fontWeight: 800, fontSize: 17 }}>스케줄</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <button
              type="button"
              style={{ ...styles.linkBtn, color: COLORS.text, fontSize: 20, padding: "4px 10px" }}
              onClick={() => {
                const d = new Date(y, m - 2, 1);
                setViewYm(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
              }}
            >
              ◀
            </button>
            <span style={{ fontWeight: 800, fontSize: 18 }}>{y}년 {m}월</span>
            <button
              type="button"
              style={{ ...styles.linkBtn, color: COLORS.text, fontSize: 20, padding: "4px 10px" }}
              onClick={() => {
                const d = new Date(y, m, 1);
                setViewYm(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
              }}
            >
              ▶
            </button>
          </div>
        </div>

        <div style={{ textAlign: "center", marginBottom: 14 }}>
          <div style={{ fontWeight: 800, fontSize: 22, color: COLORS.text }}>{y}년 {m}월</div>
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 6 }}>날짜를 눌러 주간 상세를 펼칩니다. 다시 누르면 접습니다.</div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6, textAlign: "center", fontSize: 14, fontWeight: 700, color: COLORS.textMuted, marginBottom: 10 }}>
          {wd.map((w) => (
            <span key={w}>{w}</span>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 8 }}>
          {calCellsSch.map((day, idx) => {
            if (day == null) return <span key={`se-${idx}`} />;
            const hasTemplate = savedRegions.length > 0;
            const ok = hasTemplate && dayAllFilledSch(day);
            const { work, off } = countWorkOffForDay(day);
            const wdayNum = new Date(y, m - 1, day).getDay();
            const isSun = wdayNum === 0;
            const isSat = wdayNum === 6;

// 휴무 달력(직원): 날짜를 하나씩 눌러 선택(토글)

function LeaveMonthPicker({ cursorYM, setCursorYM, pickedMap, onToggleDay, minSelectableIso, maxSelectableIso }) {
  const [y, m] = cursorYM.split("-").map(Number);
  const first = new Date(y, m - 1, 1);
  const startWeekday = first.getDay();
  const dim = new Date(y, m, 0).getDate();
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= dim; d++) cells.push(d);
  const label = `${y}년 ${m}월`;
  const minI = minSelectableIso || "";
  const maxI = maxSelectableIso || "";
  const pd = new Date(y, m - 2, 1);
  const canPrev = monthHasSelectableDay(pd.getFullYear(), pd.getMonth() + 1, minI, maxI);
  const nd = new Date(y, m, 1);
  const canNext = monthHasSelectableDay(nd.getFullYear(), nd.getMonth() + 1, minI, maxI);
  const btnNav = (disabled) => ({
    ...styles.linkBtn,
    color: disabled ? COLORS.textMuted : COLORS.text,
    opacity: disabled ? 0.45 : 1,
    cursor: disabled ? "not-allowed" : "pointer",
  });

  return (
    <div style={{ ...styles.card, marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <button
          type="button"
          style={btnNav(!canPrev)}
          disabled={!canPrev}
          onClick={() => {
            if (!canPrev) return;
            setCursorYM(`${pd.getFullYear()}-${String(pd.getMonth() + 1).padStart(2, "0")}`);
          }}
        >
          ◀
        </button>
        <span style={{ fontWeight: 700, fontSize: 15 }}>{label}</span>
        <button
          type="button"
          style={btnNav(!canNext)}
          disabled={!canNext}
          onClick={() => {
            if (!canNext) return;
            setCursorYM(`${nd.getFullYear()}-${String(nd.getMonth() + 1).padStart(2, "0")}`);
          }}
        >
          ▶
        </button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, textAlign: "center", fontSize: 11, color: COLORS.textMuted, marginBottom: 6 }}>
        {["일", "월", "화", "수", "목", "금", "토"].map((w) => <span key={w}>{w}</span>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
        {cells.map((day, idx) => {
          if (day == null) return <span key={`e-${idx}`} />;
          const iso = fmtYMD(new Date(y, m - 1, day));
          const sel = !!pickedMap[iso];
          const inRange = !minI || !maxI || (iso >= minI && iso <= maxI);
          return (
            <button
              key={iso}
              type="button"
              disabled={!inRange}
              onClick={() => inRange && onToggleDay(iso)}
              style={{
                aspectRatio: "1",
                maxHeight: 40,
                borderRadius: 10,
                border: sel ? `2px solid ${COLORS.primary}` : `1px solid ${COLORS.border}`,
                background: sel ? `${COLORS.primary}35` : COLORS.darkBg,
                color: inRange ? COLORS.text : COLORS.textMuted,
                fontSize: 13,
                fontWeight: sel ? 700 : 500,
                cursor: inRange ? "pointer" : "not-allowed",
                fontFamily: FONT,
                opacity: inRange ? 1 : 0.4,
              }}
            >
              {day}
            </button>
          );
        })}
      </div>
      <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 10, lineHeight: 1.4 }}>
        휴무로 신청할 날짜를 <strong style={{ color: COLORS.text }}>하나씩 눌러 선택</strong>합니다. 다시 누르면 선택이 취소됩니다.
        {minI && maxI ? (
          <span>
            {" "}
            (신청 가능: <strong style={{ color: COLORS.text }}>{minI}</strong> ~ <strong style={{ color: COLORS.text }}>{maxI}</strong>)
          </span>
        ) : null}
      </div>
    </div>
  );
}
